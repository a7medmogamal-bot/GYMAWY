  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    :root {
      --primary: #6C5CE7; --primary-dark: #5A4BD1; --primary-light: #A29BFE;
      --secondary: #00CEC9; --success: #00B894; --danger: #FF6B6B; --warning: #FDCB6E;
      --dark: #2D3436; --gray: #636E72; --gray-light: #B2BEC3;
      --light: #F8F9FA; --white: #FFFFFF; --border: #E9ECEF;
      --shadow: 0 2px 15px rgba(0,0,0,0.08); --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
      --radius: 20px; --radius-sm: 12px;
      --bg: #F0F2F5; --card: #FFFFFF; --text: #2D3436; --text-secondary: #636E72;
    }

    body.dark {
      --bg: #1A1A2E; --card: #16213E; --text: #E0E0E0; --text-secondary: #A0A0A0;
      --border: #2A2A4A; --shadow: 0 2px 15px rgba(0,0,0,0.3);
      --light: #1F2B47; --white: #16213E; --gray: #A0A0A0; --gray-light: #6B7280;
    }

    body { background: var(--bg); min-height: 100vh; overflow-x: hidden; color: var(--text); transition: all 0.3s; }
    .page { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header { background: var(--card); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-size: 20px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .header-logo i { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-actions { display: flex; gap: 4px; align-items: center; }
    .btn-header { padding: 8px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--light); color: var(--text); display: flex; align-items: center; gap: 5px; }
    .btn-icon-only { width: 34px; height: 34px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text); }

    .container { max-width: 520px; margin: 0 auto; padding: 12px; }

    .search-box { background: var(--card); border-radius: 50px; padding: 4px 16px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); margin-bottom: 14px; border: 2px solid var(--border); }
    .search-box input { flex: 1; padding: 11px 0; border: none; font-size: 14px; background: transparent; outline: none; color: var(--text); }

    .gym-card { background: var(--card); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; box-shadow: var(--shadow); cursor: pointer; }
    .gym-card-image { width: 100%; height: 170px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; position: relative; }
    .gym-card-image img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .gym-card-image .ph { font-size: 50px; color: rgba(255,255,255,0.4); }
    .gym-card-badge { position: absolute; top: 10px; right: 10px; background: var(--success); color: white; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700; }
    .gym-card-body { padding: 14px; }
    .gym-card-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .gym-prices { display: flex; gap: 12px; flex-wrap: wrap; }
    .gym-price-item { display: flex; flex-direction: column; }
    .gym-price-value { font-size: 18px; font-weight: 800; color: var(--primary); }
    .gym-price-label { font-size: 10px; color: var(--gray-light); }

    .loading-spinner { text-align: center; padding: 30px; }
    .loading-spinner i { font-size: 30px; color: var(--primary); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn { padding: 13px 18px; border-radius: 50px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.3s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); }
    .btn-sm { width: auto; padding: 8px 12px; font-size: 12px; }

    .tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 12px; flex-wrap: wrap; }
    .tab-btn { padding: 9px 14px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .form-card h3 { font-size: 16px; margin-bottom: 12px; color: var(--text); }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 12px; color: var(--text); }
    .form-control { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--card); color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--primary); }
    textarea.form-control { resize: vertical; min-height: 60px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .images-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .img-box { aspect-ratio: 1; border-radius: 10px; background: var(--light); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); cursor: pointer; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .img-box .del-img { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .img-box.add-box i { font-size: 24px; color: var(--gray-light); }

    .phones-list { display: flex; flex-direction: column; gap: 6px; }
    .phone-row { display: flex; gap: 6px; align-items: center; }
    .phone-row input { flex: 1; }
    .phone-row .del-phone { width: 32px; height: 32px; border-radius: 50%; background: var(--danger); color: white; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .add-phone-btn { margin-top: 6px; padding: 8px; background: var(--light); border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; text-align: center; color: var(--primary); font-weight: 600; font-size: 13px; }

    .members-table { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .members-table-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; font-size: 11px; font-weight: 700; text-align: center; }
    .members-table-row { padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; text-align: center; color: var(--text); }
    .status-badge { display: inline-block; padding: 3px 7px; border-radius: 15px; font-size: 10px; font-weight: 700; }
    .status-paid { background: #D4EDDA; color: #155724; }
    .status-unpaid { background: #F8D7DA; color: #721C24; }

    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); width: 100%; max-width: 520px; border-radius: 24px 24px 0 0; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 10; }
    .modal-header h3 { font-size: 16px; color: var(--text); }
    .modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; color: var(--text-secondary); }
    .modal-body { padding: 14px; color: var(--text); }
    .modal-footer { padding: 10px 14px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }

    .toast { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto; background: var(--dark); color: white; padding: 12px 16px; border-radius: 50px; text-align: center; z-index: 2000; display: none; font-weight: 600; font-size: 13px; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #333; }

    .radio-group { display: flex; gap: 8px; }
    .radio-option { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px; color: var(--text); background: var(--card); }
    .radio-option.selected { border-color: var(--primary); background: rgba(108,92,231,0.08); color: var(--primary); }

    .empty { text-align: center; padding: 30px 15px; color: var(--text-secondary); }
    .empty i { font-size: 40px; opacity: 0.5; margin-bottom: 10px; }

    @media (max-width: 400px) {
      .members-table-header, .members-table-row { grid-template-columns: 1.2fr 0.8fr 0.8fr 0.6fr; font-size: 10px; padding: 8px 6px; }
    }
  </style>
</head>

function T(m, t='success') { const x = document.getElementById('toast'); x.textContent = m; x.className = 'toast '+t; x.style.display = 'block'; clearTimeout(x._t); x._t = setTimeout(() => x.style.display = 'none', 3000); }
function goTo(p) {

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function fmt(d) { if(!d) return ''; return new Date(d).toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' }); }
function exp(d) { return new Date(d) < new Date(); }
function daysR(d) { return Math.ceil((new Date(d) - new Date()) / 86400000); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substring(2, 8); }
function showConfirm(t, m, cb) { 
  document.getElementById('confirmTitle').textContent = t; 
  document.getElementById('confirmBody').innerHTML = m; 
  confirmCB = cb; 
  document.getElementById('confirmYesBtn').onclick = () => { closeModal('confirmModal'); if(confirmCB) confirmCB(); }; 
  openModal('confirmModal'); 
}
function toggleDark() { 
  document.body.classList.toggle('dark'); 
  const is = document.body.classList.contains('dark'); 
  localStorage.setItem('darkMode', is?'1':'0'); 
  document.querySelectorAll('.btn-icon-only i').forEach(i => i.className = is?'fas fa-sun':'fas fa-moon'); 
}
function moveNext(c, n) { if(c.value.length === 1) document.getElementById(n)?.focus(); }

// ==================== CLOUDINARY ====================
async function uploadImg(file) {
  const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLOUD.preset);
  try { const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD.cloudName}/image/upload`, { method:'POST', body:fd }); const d = await r.json(); return d.secure_url || null; } catch(e) { return null; }
}

// #### التحقق من وجود طلب معلق لنفس الجيم ####
async function hasPendingRequest(gymId, phone) {
  const snap = await db.collection('requests')
    .where('gymId', '==', gymId)
    .where('phone', '==', phone)
    .where('status', '==', 'pending')
    .get();
  return !snap.empty;
}

// ==================== GYMS (FIREBASE) ====================
async function loadGyms() {
  const c = document.getElementById('gymsList');
  c.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
  try {
    const snap = await db.collection('gyms').get();
    G.allGyms = []; snap.forEach(doc => G.allGyms.push({ id: doc.id, ...doc.data() }));
    
    // #### إخفاء الجيمات اللي المستخدم اترفض منها 5 مرات ####
    const ph = sessionStorage.getItem('userPhone');
    let hiddenGyms = [];
    if(ph) {
      const allRejected = await db.collection('requests')
        .where('phone', '==', ph)
        .where('status', '==', 'rejected')
        .get();
      
      const rejectCount = {};
      allRejected.forEach(doc => {
        const d = doc.data();
        rejectCount[d.gymId] = (rejectCount[d.gymId] || 0) + 1;
      });
      
      hiddenGyms = Object.keys(rejectCount).filter(gid => rejectCount[gid] >= 5);
    }
    
    const s = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let f = G.allGyms.filter(g => g.active && g.subEnd && !exp(g.subEnd) && !hiddenGyms.includes(g.id));
    if(s) f = f.filter(g => g.name.toLowerCase().includes(s) || (g.location||'').toLowerCase().includes(s));
    if(!f.length) { c.innerHTML = '<div class="empty"><i class="fas fa-store-slash"></i><h4>لا جيمات متاحة</h4></div>'; return; }
    c.innerHTML = f.map(g => `
      <div class="gym-card" onclick='showGym("${g.id}")'>
        <div class="gym-card-image">${g.images?.length ? `<img src="${g.images[0]}" oncontextmenu="return false;">` : '<i class="fas fa-dumbbell ph"></i>'}${g.offerPrice ? `<span class="gym-card-badge">عرض ${g.offerPrice} ج.م</span>` : ''}</div>
        <div class="gym-card-body"><div class="gym-card-title">${g.name}</div><div class="gym-prices"><div class="gym-price-item"><span class="gym-price-value">${g.monthlyPrice}</span><span class="gym-price-label">ج.م/شهر</span></div>${g.yearlyPrice?`<div class="gym-price-item"><span class="gym-price-value">${g.yearlyPrice}</span><span class="gym-price-label">ج.م/سنة</span></div>`:''}</div></div>
      </div>`).join('');
  } catch(e) { c.innerHTML = '<div class="empty"><i class="fas fa-wifi"></i><h4>تأكد من الاتصال بالإنترنت</h4></div>'; }
}

  document.getElementById('modalTitle').textContent = g.name;
  document.getElementById('modalBody').innerHTML = `
    ${g.images?.length ? `<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;">${g.images.map(i => `<img src="${i}" style="width:180px;height:130px;object-fit:cover;border-radius:10px;pointer-events:none;" oncontextmenu="return false;">`).join('')}</div>` : ''}

    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>اشتراك شهري</span><strong style="color:var(--primary);">${g.monthlyPrice} ج.م</strong></div>
    ${g.yearlyPrice ? `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>اشتراك سنوي</span><strong style="color:var(--primary);">${g.yearlyPrice} ج.م</strong></div>` : ''}

    ${g.offerPrice ? `<div style="display:flex;justify-content:space-between;padding:5px 0;"><span>عرض خاص</span><strong style="color:var(--success);">${g.offerPrice} ج.م</strong></div>` : ''}
    <div style="margin-top:10px;padding:8px;background:var(--light);border-radius:8px;"><strong><i class="fas fa-phone"></i> التواصل:</strong> ${g.phones?.length ? g.phones.map(p => `<a href="tel:${p}" style="display:inline-block;margin:2px;padding:4px 8px;background:var(--card);border-radius:15px;color:var(--primary);text-decoration:none;font-weight:600;font-size:12px;">${p}</a>`).join('') : 'لا يوجد'}</div>

    ${g.notes ? `<div style="margin-top:6px;padding:8px;background:var(--light);border-radius:8px;"><strong><i class="fas fa-info-circle"></i> ملاحظات:</strong> ${g.notes}</div>` : ''}`;

  openModal('gymModal');
}

// ==================== SUBSCRIPTION ====================
async function subGym() {
  const ph = sessionStorage.getItem('userPhone');
  if(!ph) { G.pendGym = G.selGym; closeModal('gymModal'); goTo('register'); T('سجل بياناتك الأول', 'warning'); return; }
  
  // #### منع إرسال طلب جديد لو فيه طلب معلق ####
  const hasPending = await hasPendingRequest(G.selGym.id, ph);
  if(hasPending) { T('⚠️ لديك طلب معلق بالفعل في هذا الجيم. انتظر رد الكوتش.', 'warning'); return; }
  
  G.subType = 'monthly';
  document.getElementById('modalTitle').textContent = 'اختر نوع الاشتراك';
  document.getElementById('modalBody').innerHTML = `<p style="text-align:center;color:var(--text);"><strong>${G.selGym.name}</strong></p><div class="radio-group"><div class="radio-option selected" id="optMonthly" onclick="selSub('monthly')">📅 شهري<span style="display:block;font-size:11px;color:var(--text-secondary);">${G.selGym.monthlyPrice} ج.م/شهر</span></div>${G.selGym.yearlyPrice ? `<div class="radio-option" id="optYearly" onclick="selSub('yearly')">📆 سنوي<span style="display:block;font-size:11px;color:var(--text-secondary);">${G.selGym.yearlyPrice} ج.م/سنة</span></div>` : ''}</div><div style="margin-top:10px;padding:8px;background:#EFF6FF;border-radius:8px;font-size:11px;color:#1E40AF;">بعد التقديم توجه للجيم للدفع</div>`;
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-primary" onclick="confirmSub()">✅ تأكيد الطلب</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>';
  openModal('gymModal');
}
function selSub(t) { G.subType = t; document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected')); document.getElementById(t === 'monthly' ? 'optMonthly' : 'optYearly').classList.add('selected'); }
async function confirmSub() {
  const ph = sessionStorage.getItem('userPhone'), nm = sessionStorage.getItem('userName') || '';
  const req = { gymId: G.selGym.id, gymName: G.selGym.name, name: nm, phone: ph, subType: G.subType, status: 'pending', created: new Date().toISOString() };
  await db.collection('requests').add(req);
  await rtdb.ref('newRequests/' + G.selGym.id).set({ time: Date.now() });
  closeModal('gymModal'); T('تم إرسال الطلب بنجاح');
}

async function saveProfile() {
  const n = document.getElementById('regName').value.trim(), p = document.getElementById('regPhone').value.trim();
  if(!n || !p) { T('اكتب البيانات', 'error'); return; }
  sessionStorage.setItem('userPhone', p); sessionStorage.setItem('userName', n);
  await db.collection('profiles').doc(p).set({ name: n, phone: p, created: new Date().toISOString() }, { merge: true });
  T('تم الحفظ');
  if(G.pendGym) { const g = G.pendGym; G.pendGym = null; goTo('home'); setTimeout(() => { G.selGym = g; subGym(); }, 200); }
  else goTo('profile');
}
async function loadProfile() {
  const ph = sessionStorage.getItem('userPhone'), c = document.getElementById('profileContent');

  const snap = await db.collection('profiles').doc(ph).get();
  if(!snap.exists) { goTo('register'); return; }
  const prof = snap.data();
  const mSnap = await db.collection('members').where('phone', '==', ph).get();
  const members = []; mSnap.forEach(doc => members.push({ id: doc.id, ...doc.data() }));
  const active = members.filter(m => m.active && !m.leftByUser);
  const hist = members.filter(m => !m.active || m.leftByUser);
  c.innerHTML = `<div style="background:var(--card);border-radius:16px;padding:16px;text-align:center;margin-bottom:12px;box-shadow:var(--shadow);"><i class="fas fa-user-circle" style="font-size:46px;color:var(--primary);"></i><h2 style="color:var(--text);">${prof.name}</h2><p style="color:var(--text-secondary);">📞 ${prof.phone}</p><button class="btn btn-outline btn-sm" onclick="logoutUser()">خروج</button></div><h3 style="color:var(--text);margin-bottom:8px;">📋 اشتراكاتي</h3>${active.length ? active.map(m => { const ok = m.paid && !exp(m.due); return `<div style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:16px;padding:14px;color:white;margin-bottom:8px;position:relative;"><button style="position:absolute;top:8px;left:8px;background:rgba(255,255,255,0.2);border:none;color:white;padding:4px 8px;border-radius:10px;font-size:10px;cursor:pointer;" onclick="leaveGym('${m.id}')">🚪 خروج</button><div style="font-size:16px;font-weight:800;">${m.gymName}</div><div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;margin:6px 0;"><div style="display:flex;justify-content:space-between;font-size:12px;"><span>بدء</span><span>${fmt(m.start)}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;"><span>استحقاق</span><span>${fmt(m.due)}</span></div></div><span style="display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;background:${ok?'rgba(0,184,148,0.3)':'rgba(255,107,107,0.3)'};">${ok?'✅ مدفوع':'❌ متأخر'}</span></div>`; }).join('') : '<p style="color:var(--text-secondary);text-align:center;">لا اشتراكات</p>'}${hist.length ? `<h3 style="color:var(--text);margin-top:12px;">📜 السجل</h3>${hist.map(m => `<div style="background:var(--card);border-radius:8px;padding:8px;margin-bottom:4px;font-size:12px;color:var(--text-secondary);"><strong>${m.gymName}</strong> - ${m.leftByUser?'🚪 خرج':'انتهى'} ${fmt(m.due)}</div>`).join('')}` : ''}`;
}
async function leaveGym(mid) {
  showConfirm('تأكيد الخروج', '<p style="color:var(--text-secondary);">متأكد من الخروج من الجيم؟ ستحتاج لتقديم طلب جديد للعودة.</p>', async () => {
    await db.collection('members').doc(mid).update({ leftByUser: true, active: false, paid: false, leaveDate: new Date().toISOString() });
    T('تم الخروج', 'warning'); loadProfile();
  });
}
function logoutUser() { sessionStorage.removeItem('userPhone'); sessionStorage.removeItem('userName'); goTo('home'); }

// ==================== REDEEM ====================
async function checkCode() {
  const code = document.getElementById('redeemCode').value.trim().toUpperCase();
  if(code === ADMIN_CODE) { openModal('passcodeModal'); return; }
  const snap = await db.collection('gyms').where('redeemCode', '==', code).get();
  if(snap.empty) { T('الكود غير صحيح', 'error'); return; }
  const doc = snap.docs[0]; G.gym = { id: doc.id, ...doc.data() }; G.gid = doc.id;
  if(!G.gym.active || exp(G.gym.subEnd)) { T('الجيم غير مفعل أو الاشتراك منتهي. للتواصل: ' + PHONE, 'error'); return; }
  const r = daysR(G.gym.subEnd); if(r <= 3 && r > 0) T(`متبقي ${r} يوم. للتواصل: ${PHONE}`, 'warning');
  sessionStorage.setItem('coachId', G.gid);
  document.getElementById('coachTitle').textContent = G.gym.name;
  document.getElementById('redeemCode').value = '';
  goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount();
  if(reqListener) rtdb.ref('newRequests/' + G.gid).off('value', reqListener);
  reqListener = snap => {
    if(snap.val()) {
      T('🔔 طلب اشتراك جديد!', 'warning');
      loadReqCount();
      rtdb.ref('newRequests/' + G.gid).remove();
    }
  };
  rtdb.ref('newRequests/' + G.gid).on('value', reqListener);
}

function verifyPass() {
  let v = '';
  for(let i = 1; i <= 6; i++) v += document.getElementById('pc' + i).value;
  const inputHash = CryptoJS.SHA256(v).toString();
  if(inputHash === PASS_HASH) {
    closeModal('passcodeModal');
    sessionStorage.setItem('admin', '1');
    for(let i = 1; i <= 6; i++) document.getElementById('pc' + i).value = '';
    goTo('admin'); loadAdmin();
  } else T('كلمة مرور غير صحيحة', 'error');
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${t}')"]`)?.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if(t === 'requests') loadRequests();
  if(t === 'members') loadMembers();
  if(t === 'sessions') loadSessions();
}
function loadGymForm() { const g = G.gym; document.getElementById('gymName').value = g.name || ''; document.getElementById('monthlyPrice').value = g.monthlyPrice || ''; document.getElementById('yearlyPrice').value = g.yearlyPrice || ''; document.getElementById('sessionPrice').value = g.sessionPrice || ''; document.getElementById('offerPrice').value = g.offerPrice || ''; document.getElementById('gymLoc').value = g.location || ''; document.getElementById('gymNotes').value = g.notes || ''; }
function renderImages() { const g = G.gym, grid = document.getElementById('imagesGrid'); let h = ''; if(g.images) g.images.forEach((img, i) => { h += `<div class="img-box"><img src="${img}" oncontextmenu="return false;"><button class="del-img" onclick="event.stopPropagation();delImg(${i})">✕</button></div>`; }); h += `<div class="img-box add-box" onclick="document.getElementById('imageInput').click()"><i class="fas fa-plus"></i></div>`; grid.innerHTML = h; }
async function uploadGymImages(input) { if(!G.gym.images) G.gym.images = []; if(G.gym.images.length >= 5) { T('أقصى حد 5 صور', 'warning'); input.value = ''; return; } for(const f of Array.from(input.files).slice(0, 5 - G.gym.images.length)) { T('⏳ جاري رفع الصورة...'); const url = await uploadImg(f); if(url) { G.gym.images.push(url); renderImages(); T('✅ تم رفع الصورة'); } else T('❌ فشل الرفع', 'error'); } input.value = ''; }
function delImg(i) { showConfirm('حذف الصورة', '<p>متأكد من حذف الصورة؟</p>', () => { G.gym.images.splice(i, 1); renderImages(); }); }
function renderPhones() { const g = G.gym, list = document.getElementById('phonesList'); let h = ''; if(g.phones) g.phones.forEach((p, i) => { h += `<div class="phone-row"><input type="tel" value="${p}" class="form-control" onchange="updatePhone(${i},this.value)"><button class="del-phone" onclick="delPhone(${i})">✕</button></div>`; }); list.innerHTML = h; }
function addPhoneField() { if(!G.gym.phones) G.gym.phones = []; G.gym.phones.push(''); renderPhones(); }
function updatePhone(i, v) { G.gym.phones[i] = v; }
function delPhone(i) { G.gym.phones.splice(i, 1); renderPhones(); }

async function saveGym() {
  const n = document.getElementById('gymName').value.trim(), mp = +document.getElementById('monthlyPrice').value;
  if(!n) { T('اكتب اسم الجيم', 'error'); return; } if(!mp || mp <= 0) { T('اكتب سعر الشهر', 'error'); return; }
  const data = { name: n, monthlyPrice: mp, yearlyPrice: document.getElementById('yearlyPrice').value ? +document.getElementById('yearlyPrice').value : null, sessionPrice: +document.getElementById('sessionPrice').value || 0, offerPrice: document.getElementById('offerPrice').value ? +document.getElementById('offerPrice').value : null, location: document.getElementById('gymLoc').value, notes: document.getElementById('gymNotes').value, images: G.gym.images || [], phones: G.gym.phones || [] };
  await db.collection('gyms').doc(G.gid).update(data);
  G.gym = { ...G.gym, ...data }; document.getElementById('coachTitle').textContent = G.gym.name;
  T('تم حفظ التعديلات بنجاح');
}

async function loadReqCount() { const snap = await db.collection('requests').where('gymId', '==', G.gid).where('status', '==', 'pending').get(); const b = document.getElementById('reqBadge'); b.textContent = snap.size; b.style.display = snap.size > 0 ? 'inline-block' : 'none'; }
async function loadRequests() {
  const snap = await db.collection('requests').where('gymId', '==', G.gid).where('status', '==', 'pending').get();
  const reqs = []; snap.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
  const c = document.getElementById('requestsList');
  if(!reqs.length) { c.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><h4>لا طلبات معلقة</h4></div>'; return; }
  c.innerHTML = reqs.map(r => `<div style="background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;"><div style="display:flex;justify-content:space-between;"><strong style="color:var(--text);">${r.name}</strong><span style="font-size:10px;color:var(--text-secondary);">${fmt(r.created)}</span></div><div style="color:var(--text-secondary);font-size:11px;margin:3px 0;">📞 ${r.phone} | ${r.subType === 'monthly' ? 'شهري' : 'سنوي'}</div><div style="display:flex;gap:4px;"><button class="btn btn-success btn-sm" onclick='accReq("${r.id}")'>✅ قبول</button><button class="btn btn-danger btn-sm" onclick='rejReq("${r.id}")'>❌ رفض</button></div></div>`).join('');
}
async function accReq(rid) {
  const reqSnap = await db.collection('requests').doc(rid).get(); const req = reqSnap.data();
  const dupSnap = await db.collection('members').where('gymId', '==', G.gid).where('phone', '==', req.phone).where('active', '==', true).where('leftByUser', '==', false).get();
  if(!dupSnap.empty) { T('⚠️ هذا الرقم موجود بالفعل كمشترك نشط', 'error'); return; }
  const sd = new Date(); const dd = new Date(sd); 
  req.subType === 'monthly' ? dd.setDate(dd.getDate() + 30) : dd.setDate(dd.getDate() + 365);
  
  await db.collection('members').add({ 
    gymId: G.gid, gymName: G.gym.name, name: req.name, phone: req.phone, 
    type: req.subType, start: sd.toISOString(), due: dd.toISOString(), 
    monthlyPrice: G.gym.monthlyPrice, yearlyPrice: G.gym.yearlyPrice, 
    paid: true, active: true, leftByUser: false, created: new Date().toISOString() 
  });
  
  await db.collection('requests').doc(rid).update({ status: 'accepted' });
  loadRequests(); loadReqCount(); T('تم قبول الطلب');
}
async function rejReq(rid) { 
  showConfirm('رفض الطلب', '<p style="color:var(--text-secondary);">متأكد من رفض الطلب؟</p>', async () => { 
    await db.collection('requests').doc(rid).update({ status: 'rejected' }); 
    loadRequests(); loadReqCount(); T('تم الرفض'); 
  }); 
}

async function loadMembers() {
  const c = document.getElementById('membersList');
  try {
    const snap = await db.collection('members')
      .where('gymId', '==', G.gid)
      .where('active', '==', true)
      .where('leftByUser', '==', false)
      .get();
    
    const ms = []; 
    snap.forEach(doc => {
      const data = doc.data();
      ms.push({ id: doc.id, ...data });
    });
    
    const s = (document.getElementById('memberSearchInput')?.value || '').toLowerCase();
    let f = ms;
    if(s) f = ms.filter(m => (m.name || '').toLowerCase().includes(s) || (m.phone || '').includes(s));
    
    if(!f.length) { c.innerHTML = '<div class="empty"><i class="fas fa-users"></i><h4>لا مشتركين</h4></div>'; return; }
    
    c.innerHTML = `<div class="members-table">
      <div class="members-table-header"><span>الاسم</span><span>النوع</span><span>الاستحقاق</span><span>الحالة</span></div>
      ${f.map(m => { 
        const isPaid = m.paid === true;
        const isExpired = exp(m.due);
        const ok = isPaid && !isExpired;
        const displayName = m.name || 'بدون اسم';
        
        return `<div class="members-table-row" onclick='memAct("${m.id}")'>
          <span style="font-weight:600;">${displayName}</span>
          <span style="font-size:10px;">${m.type === 'monthly' ? 'شهري' : 'سنوي'}</span>
          <span style="font-size:10px;">${fmt(m.due)}</span>
          <span><span class="status-badge ${ok ? 'status-paid' : 'status-unpaid'}">${ok ? 'مدفوع' : 'متأخر'}</span></span>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e) {
    c.innerHTML = '<div class="empty"><i class="fas fa-exclamation-triangle"></i><h4>خطأ في تحميل المشتركين</h4></div>';
  }
}

async function memAct(mid) {
  try {
    const snap = await db.collection('members').doc(mid).get(); 
    const m = snap.data();
    G.curMem = { id: snap.id, ...m };
    
    const isPaid = m.paid === true;
    const isExpired = exp(m.due);
    const ok = isPaid && !isExpired;
    const canRenew = !isPaid || isExpired;
    const displayName = m.name || 'بدون اسم';
    const typeLabel = m.type === 'monthly' ? 'شهري' : 'سنوي';
    
    document.getElementById('modalTitle').textContent = 'تفاصيل المشترك';
    document.getElementById('modalBody').innerHTML = `<div style="text-align:center;">
      <i class="fas fa-user-circle" style="font-size:40px;color:var(--primary);"></i>
      <h3 style="color:var(--text);">${displayName}</h3>
      <p style="color:var(--text-secondary);">📞 ${m.phone || 'لا يوجد'}</p>
      <div style="background:var(--light);border-radius:8px;padding:10px;text-align:right;">
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>📅 تاريخ البداية</span><strong>${fmt(m.start)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>⏳ تاريخ الانتهاء</span><strong>${fmt(m.due)}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);"><span>النوع</span><strong>${typeLabel}</strong></div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;"><span>السعر</span><strong>${m.monthlyPrice || m.yearlyPrice || '—'} ج.م</strong></div>
        <div style="margin-top:6px;"><span class="status-badge ${ok ? 'status-paid' : 'status-unpaid'}" style="font-size:12px;">${ok ? '✅ مدفوع' : '❌ متأخر - يحتاج تجديد'}</span></div>
      </div>
    </div>`;
    
    let ft = '';
    if(canRenew) {
      ft += `<button class="btn btn-success" onclick="renewMem()">🔄 تجديد الاشتراك</button>`;
    } else {
      ft += `<div style="padding:8px;background:#D4EDDA;border-radius:8px;text-align:center;font-size:12px;color:#155724;margin-bottom:4px;">✅ الاشتراك ساري - لا يحتاج تجديد</div>`;
    }
    ft += `<button class="btn btn-outline btn-sm" onclick='showEditMember("${G.curMem.id}")'>✏️ تعديل</button>
      <button class="btn btn-danger btn-sm" onclick="expelMem()">❌ طرد</button>
      <button class="btn btn-outline" onclick="closeModal('gymModal')">إغلاق</button>`;
    
    document.getElementById('modalFooter').innerHTML = ft; 
    openModal('gymModal');
  } catch(e) {
    T('خطأ في تحميل بيانات المشترك', 'error');
  }
}

async function showEditMember(mid) {
  const snap = await db.collection('members').doc(mid).get(); 
  const m = snap.data();
  
  document.getElementById('modalTitle').textContent = 'تعديل بيانات المشترك';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>الاسم</label><input type="text" id="editMemName" class="form-control" value="${m.name || ''}"></div>
    <div class="form-group"><label>الهاتف</label><input type="tel" id="editMemPhone" class="form-control" value="${m.phone || ''}"></div>`;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-primary" onclick='saveEditMember("${mid}")'>💾 حفظ</button>
    <button class="btn btn-outline" onclick="memAct('${mid}')">رجوع</button>`;
}
async function saveEditMember(mid) {
  const nn = document.getElementById('editMemName').value.trim(), np = document.getElementById('editMemPhone').value.trim();
  if(!nn) { T('اكتب الاسم', 'error'); return; }
  if(!np) { T('اكتب رقم الهاتف', 'error'); return; }
  const dupSnap = await db.collection('members').where('gymId', '==', G.gid).where('phone', '==', np).where('active', '==', true).where('leftByUser', '==', false).get();
  if(!dupSnap.empty && dupSnap.docs[0].id !== mid) { T('⚠️ الرقم مستخدم لمشترك آخر', 'error'); return; }
  await db.collection('members').doc(mid).update({ name: nn, phone: np });
  loadMembers(); 
  T('تم التعديل');
  // الرجوع لتفاصيل المشترك بعد التعديل
  setTimeout(() => memAct(mid), 300);
}
async function renewMem() {
  const m = G.curMem;
  const isPaid = m.paid === true;
  const isExpired = exp(m.due);
  
  // #### منع التجديد لو الاشتراك لسه ساري ####
  if(isPaid && !isExpired) { T('⚠️ الاشتراك لسه ساري - لا يمكن التجديد الآن', 'error'); return; }
  
  document.getElementById('modalTitle').textContent = 'تجديد الاشتراك';
  document.getElementById('modalBody').innerHTML = `<p style="text-align:center;color:var(--text);"><strong>${m.name || 'بدون اسم'}</strong></p>
    <p style="text-align:center;color:var(--text-secondary);font-size:12px;">الاشتراك الحالي: ${m.type === 'monthly' ? 'شهري' : 'سنوي'}</p>
    <div class="radio-group">
      <div class="radio-option ${m.type === 'monthly' ? 'selected' : ''}" id="renOptMonthly" onclick="selRen('monthly')">📅 شهري<span style="display:block;font-size:10px;">${G.gym.monthlyPrice} ج.م</span></div>
      ${G.gym.yearlyPrice ? `<div class="radio-option ${m.type === 'yearly' ? 'selected' : ''}" id="renOptYearly" onclick="selRen('yearly')">📆 سنوي<span style="display:block;font-size:10px;">${G.gym.yearlyPrice} ج.م</span></div>` : ''}
    </div>`;
  document.getElementById('modalFooter').innerHTML = `<button class="btn btn-success" onclick="confirmRenew()">✅ تأكيد التجديد</button><button class="btn btn-outline" onclick="memAct('${m.id}')">رجوع</button>`;
  G.subType = m.type || 'monthly'; 
  openModal('gymModal');
}
function selRen(t) { G.subType = t; document.querySelectorAll('#modalBody .radio-option').forEach(o => o.classList.remove('selected')); document.getElementById(t === 'monthly' ? 'renOptMonthly' : 'renOptYearly').classList.add('selected'); }
async function confirmRenew() {
  const dd = new Date();
  G.subType === 'monthly' ? dd.setDate(dd.getDate() + 30) : dd.setDate(dd.getDate() + 365);
  
  await db.collection('members').doc(G.curMem.id).update({
    due: dd.toISOString(), 
    paid: true, 
    type: G.subType,
    monthlyPrice: G.gym.monthlyPrice, 
    yearlyPrice: G.gym.yearlyPrice,
    start: new Date().toISOString()
  });
  
  closeModal('gymModal'); 
  loadMembers(); 
  T('✅ تم تجديد الاشتراك بنجاح');
}
async function expelMem() {
  const m = G.curMem;
  showConfirm(
    'طرد المشترك', 
    `<p style="color:var(--text-secondary);">هل أنت متأكد من طرد <strong>${m.name || 'بدون اسم'}</strong>؟</p>
     <p style="color:var(--danger);font-size:12px;">⚠️ سيتم احتسابها كرفض للمشترك (من الـ 5 رفضات المسموحة)</p>`, 
    async () => {
      // #### تحديث العضوية ####
      await db.collection('members').doc(m.id).update({ 
        active: false, 
        leftByUser: false,
        expelledByCoach: true, 
        expelledAt: new Date().toISOString(),
        paid: false
      });
      
      // #### إضافة سجل رفض (يحتسب من الـ 5) ####
      await db.collection('requests').add({
        gymId: G.gid,
        gymName: G.gym.name,
        name: m.name || 'بدون اسم',
        phone: m.phone || '',
        subType: m.type || 'monthly',
        status: 'rejected',
        reason: 'expelled_by_coach',
        created: new Date().toISOString()
      });
      
      closeModal('gymModal'); 
      loadMembers(); 
      T('تم طرد المشترك (تم احتساب رفض)', 'warning');
    }
  );
}

async function showAddMember() {
  document.getElementById('modalTitle').textContent = 'إضافة مشترك';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>الاسم *</label><input type="text" id="addMemName" class="form-control"></div>
    <div class="form-group"><label>الهاتف *</label><input type="tel" id="addMemPhone" class="form-control"></div>
    <div class="form-group"><label>النوع</label><select id="addMemType" class="form-control"><option value="monthly">شهري (30 يوم)</option><option value="yearly">سنوي (365 يوم)</option></select></div>
    <div class="form-group"><label>تاريخ الدفع</label><input type="date" id="addMemDate" class="form-control"></div>`;
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-success" onclick="addMem()">➕ إضافة</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>';
  document.getElementById('addMemDate').value = new Date().toISOString().split('T')[0]; 
  openModal('gymModal');
}
async function addMem() {
  const n = document.getElementById('addMemName').value.trim(), 
        p = document.getElementById('addMemPhone').value.trim(), 
        t = document.getElementById('addMemType').value, 
        d = document.getElementById('addMemDate').value;
        
  if(!n || !p) { T('اكتب البيانات كاملة (الاسم والهاتف)', 'error'); return; }
  
  const dupSnap = await db.collection('members')
    .where('gymId', '==', G.gid)
    .where('phone', '==', p)
    .where('active', '==', true)
    .where('leftByUser', '==', false)
    .get();
    
  if(!dupSnap.empty) { T('⚠️ هذا الرقم موجود بالفعل كمشترك نشط', 'error'); return; }
  
  // #### حساب تاريخ الانتهاء: +30 يوم للشهري، +365 يوم للسنوي ####
  const startDate = new Date(d);
  const dueDate = new Date(startDate);
  
  if(t === 'monthly') {
    dueDate.setDate(dueDate.getDate() + 30);
  } else {
    dueDate.setDate(dueDate.getDate() + 365);
  }
  
  const memberData = {
    gymId: G.gid,
    gymName: G.gym.name,
    name: n,
    phone: p,
    type: t,
    start: startDate.toISOString(),
    due: dueDate.toISOString(),
    monthlyPrice: G.gym.monthlyPrice,
    yearlyPrice: G.gym.yearlyPrice,
    paid: true,
    active: true,
    leftByUser: false,
    isManual: true,
    created: new Date().toISOString()
  };
  
  await db.collection('members').add(memberData);
  closeModal('gymModal'); 
  loadMembers(); 
  T('✅ تم إضافة المشترك بنجاح');
}

// ==================== SESSIONS (LocalStorage) ====================
function getSessions() { try { return JSON.parse(localStorage.getItem('gymawy_sessions') || '[]'); } catch(e) { return []; } }
function saveSessions(ss) { localStorage.setItem('gymawy_sessions', JSON.stringify(ss)); }
function loadSessions() {
  const date = document.getElementById('sessionDate').value || new Date().toISOString().split('T')[0];
  const ss = getSessions().filter(s => s.gymId === G.gid && s.date === date);
  const total = ss.reduce((a, s) => a + s.price, 0);
  document.getElementById('sessCount').textContent = ss.length;
  document.getElementById('sessTotal').textContent = total + ' ج.م';
  const c = document.getElementById('sessionsList');
  if(!ss.length) { c.innerHTML = '<div class="empty"><i class="fas fa-calendar"></i><h4>لا حصص في هذا اليوم</h4></div>'; return; }
  c.innerHTML = ss.map(s => `<div style="background:var(--card);border-radius:8px;padding:8px;margin-bottom:4px;display:flex;justify-content:space-between;"><span style="color:var(--text);">${s.name}</span><span style="color:var(--primary);font-weight:700;">${s.price} ج.م</span></div>`).join('');
}
function showAddSession() {
  document.getElementById('modalTitle').textContent = 'حصة جديدة';
  document.getElementById('modalBody').innerHTML = `<div class="form-group"><label>اسم المتدرب</label><input type="text" id="sessName" class="form-control"></div><div class="form-group"><label>السعر</label><input type="number" id="sessPrice" class="form-control" value="${G.gym.sessionPrice || 0}"></div>`;
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-primary" onclick="addSess()">تسجيل</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>';
  openModal('gymModal');
}
function addSess() {
  const n = document.getElementById('sessName').value.trim(), p = +document.getElementById('sessPrice').value;
  if(!n) { T('اكتب الاسم', 'error'); return; }
  const ss = getSessions(); ss.push({ id: uid(), gymId: G.gid, name: n, price: p, date: new Date().toISOString().split('T')[0], created: new Date().toISOString() });
  saveSessions(ss); closeModal('gymModal'); loadSessions(); T('تم تسجيل الحصة');
}

function logoutCoach() {
  if(reqListener && G.gid) { rtdb.ref('newRequests/' + G.gid).off('value', reqListener); reqListener = null; }
  sessionStorage.removeItem('coachId'); G.gym = null; G.gid = null; goTo('home');
}

        act = gs.filter(g => g.active && !exp(g.subEnd)).length, 
        expiring = gs.filter(g => g.active && g.subEnd && daysR(g.subEnd) <= 3 && daysR(g.subEnd) > 0).length;

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">

      <div class="form-card" style="text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--success);">${act}</div><div style="font-size:11px;">نشط</div></div>
      <div class="form-card" style="text-align:center;"><div style="font-size:22px;font-weight:800;color:${expiring > 0 ? 'var(--danger)' : 'var(--gray)'};">${expiring}</div><div style="font-size:11px;">قريب الانتهاء</div></div>
    </div>

      <h3 style="color:var(--text);">الجيمات</h3>
      <button class="btn btn-primary btn-sm" onclick="newGym()">+ جيم</button>
    </div>
    ${gs.map(g => { 
      const ok = g.active && !exp(g.subEnd); 
      const r = daysR(g.subEnd) || 0; 
      return `<div style="background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;box-shadow:var(--shadow);">
        <div style="display:flex;justify-content:space-between;">
          <strong style="color:var(--text);">${g.name}</strong>
          <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${ok ? '#D4EDDA' : '#F8D7DA'};color:${ok ? '#155724' : '#721C24'};">${ok ? 'نشط' : 'منتهي'}</span>
        </div>
        <div style="color:var(--text-secondary);font-size:11px;margin:3px 0;">🔑 ${g.redeemCode} | متبقي ${r} يوم</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          <button class="btn btn-success btn-sm" onclick='renGym("${g.id}")'>تجديد</button>
          <button class="btn ${g.active ? 'btn-danger' : 'btn-success'} btn-sm" onclick='togGym("${g.id}")'>${g.active ? 'تعطيل' : 'تفعيل'}</button>
          <button class="btn btn-outline btn-sm" onclick='editRedeemCode("${g.id}","${g.redeemCode}")'>🔑 تعديل الكود</button>
          <button class="btn btn-danger btn-sm" onclick='deleteGym("${g.id}","${g.name}")'>🗑️ حذف</button>
        </div>
      </div>`;
    }).join('')}`;
}

function newGym() { 
  document.getElementById('modalTitle').textContent = 'جيم جديد'; 
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>الاسم</label><input type="text" id="ngName" class="form-control"></div>
    <div class="form-group"><label>الكود</label><input type="text" id="ngCode" class="form-control" style="text-transform:uppercase;"></div>
    <div class="row">
      <div class="form-group"><label>النوع</label><select id="ngType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div>
      <div class="form-group"><label>تاريخ البداية</label><input type="date" id="ngDate" class="form-control"></div>
    </div>`; 
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-primary" onclick="createGym()">إنشاء</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>'; 
  document.getElementById('ngDate').value = new Date().toISOString().split('T')[0];

async function createGym() {
  const n = document.getElementById('ngName').value.trim(), 
        co = document.getElementById('ngCode').value.trim().toUpperCase(), 
        t = document.getElementById('ngType').value, 
        d = document.getElementById('ngDate').value;
  if(!n || !co) { T('اكتب البيانات', 'error'); return; }
  const snap = await db.collection('gyms').where('redeemCode', '==', co).get();
  if(!snap.empty) { T('الكود مستخدم', 'error'); return; }
  const dd = new Date(d); t === 'monthly' ? dd.setDate(dd.getDate() + 30) : dd.setDate(dd.getDate() + 365);
  await db.collection('gyms').add({ 
    name: n, redeemCode: co, active: true, images: [], monthlyPrice: 0, yearlyPrice: null, 
    sessionPrice: 0, offerPrice: null, phones: [], location: '', notes: '', subType: t, 
    subStart: new Date(d).toISOString(), subEnd: dd.toISOString(), created: new Date().toISOString() 
  });
  closeModal('gymModal'); loadAdmin(); T('تم إنشاء الجيم');
}

function editRedeemCode(gid, currentCode) {
  document.getElementById('modalTitle').textContent = 'تعديل كود الجيم';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>الكود الحالي</label><input type="text" class="form-control" value="${currentCode}" disabled style="background:var(--light);color:var(--gray);"></div>
    <div class="form-group"><label>الكود الجديد</label><input type="text" id="editRedeemCode" class="form-control" style="text-transform:uppercase;" value=""></div>
    <p style="font-size:11px;color:var(--text-secondary);">الكود الجديد لازم يكون فريد (مش مستخدم لجيم تاني)</p>`;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-primary" onclick='saveRedeemCode("${gid}")'>💾 حفظ الكود الجديد</button>
    <button class="btn btn-outline" onclick="closeModal('gymModal')">إلغاء</button>`;
  openModal('gymModal');
}

async function saveRedeemCode(gid) {
  const newCode = document.getElementById('editRedeemCode').value.trim().toUpperCase();
  if(!newCode) { T('اكتب الكود الجديد', 'error'); return; }
  const snap = await db.collection('gyms').where('redeemCode', '==', newCode).get();
  if(!snap.empty && snap.docs[0].id !== gid) { T('⚠️ الكود مستخدم لجيم آخر', 'error'); return; }
  await db.collection('gyms').doc(gid).update({ redeemCode: newCode });
  closeModal('gymModal'); loadAdmin(); T('✅ تم تحديث الكود بنجاح');
}

function deleteGym(gid, gname) {
  showConfirm(
    '🗑️ حذف الجيم',
    `<div style="text-align:center;padding:10px;">
      <i class="fas fa-exclamation-triangle" style="font-size:40px;color:var(--danger);margin-bottom:10px;"></i>
      <h3 style="color:var(--text);">هل أنت متأكد من حذف جيم:</h3>
      <h4 style="color:var(--primary);margin:10px 0;">"${gname}"</h4>
      <p style="color:var(--danger);font-size:13px;">⚠️ هذا الإجراء لا يمكن التراجع عنه!</p>
      <p style="color:var(--text-secondary);font-size:11px;">سيتم حذف جميع بيانات الجيم بما فيها المشتركين والطلبات المرتبطة به.</p>
    </div>`,
    async () => {
      T('⏳ جاري حذف الجيم...', 'warning');
      try {
        const memSnap = await db.collection('members').where('gymId', '==', gid).get();
        const memBatch = db.batch();
        memSnap.forEach(doc => memBatch.delete(doc.ref));
        await memBatch.commit();
        
        const reqSnap = await db.collection('requests').where('gymId', '==', gid).get();
        const reqBatch = db.batch();
        reqSnap.forEach(doc => reqBatch.delete(doc.ref));
        await reqBatch.commit();
        
        await db.collection('gyms').doc(gid).delete();
        loadAdmin(); T('✅ تم حذف الجيم وجميع بياناته بنجاح');
      } catch(e) {
        T('❌ حدث خطأ أثناء الحذف', 'error');
      }
    }
  );
}

function renGym(id) { 
  G.renGym = id; 
  document.getElementById('modalTitle').textContent = 'تجديد'; 
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>النوع</label><select id="renType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div>
    <div class="form-group"><label>تاريخ البداية</label><input type="date" id="renDate" class="form-control"></div>`; 
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-success" onclick="doRenew()">تأكيد</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>'; 
  document.getElementById('renDate').value = new Date().toISOString().split('T')[0]; 
  openModal('gymModal'); 
}

async function doRenew() {
  const t = document.getElementById('renType').value, d = document.getElementById('renDate').value;
  const dd = new Date(d); t === 'monthly' ? dd.setDate(dd.getDate() + 30) : dd.setDate(dd.getDate() + 365);
  await db.collection('gyms').doc(G.renGym).update({ subType: t, subStart: new Date(d).toISOString(), subEnd: dd.toISOString(), active: true });
  closeModal('gymModal'); loadAdmin(); T('تم التجديد');
}

async function togGym(id) { 
  const snap = await db.collection('gyms').doc(id).get(); 
  const g = snap.data(); 
  await db.collection('gyms').doc(id).update({ active: !g.active }); 
  loadAdmin(); 
  T(g.active ? 'تم التعطيل' : 'تم التفعيل'); 
}

function logoutAdmin() { sessionStorage.removeItem('admin'); goTo('home'); }

// ==================== INIT ====================
(async function() {
  if(localStorage.getItem('darkMode') === '1') { 
    document.body.classList.add('dark'); 
    document.querySelectorAll('.btn-icon-only i').forEach(i => i.className = 'fas fa-sun'); 
  }
  if(sessionStorage.getItem('admin') === '1') { goTo('admin'); loadAdmin(); return; }
  const cid = sessionStorage.getItem('coachId');
  if(cid) {
    const snap = await db.collection('gyms').doc(cid).get();
    if(snap.exists && snap.data().active) { 
      G.gym = { id: snap.id, ...snap.data() }; 
      G.gid = snap.id; 
      document.getElementById('coachTitle').textContent = G.gym.name; 
      goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount(); return; 
    }
    sessionStorage.removeItem('coachId');
  }
  goTo('home'); loadGyms();
})();
</script>
