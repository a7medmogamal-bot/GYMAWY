  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <meta name="theme-color" content="#6C5CE7">
  <title>جيماوي - منصة الجيمات</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    :root {
      --primary: #6C5CE7; --primary-dark: #5A4BD1; --primary-light: #A29BFE;
      --secondary: #00CEC9; --success: #00B894; --danger: #FF6B6B; --warning: #FDCB6E;
      --dark: #2D3436; --gray: #636E72; --gray-light: #B2BEC3;
      --light: #F8F9FA; --white: #FFFFFF; --border: #E9ECEF;
      --shadow: 0 2px 15px rgba(0,0,0,0.08); --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
      --radius: 20px; --radius-sm: 12px;
      --bg: #F0F2F5; --card: #FFFFFF; --text: #2D3436; --text-secondary: #636E72;
    }

    body.dark {
      --bg: #1A1A2E; --card: #16213E; --text: #E0E0E0; --text-secondary: #A0A0A0;
      --border: #2A2A4A; --shadow: 0 2px 15px rgba(0,0,0,0.3);
      --light: #1F2B47; --white: #16213E; --gray: #A0A0A0; --gray-light: #6B7280;
    }

    body { background: var(--bg); min-height: 100vh; overflow-x: hidden; color: var(--text); transition: all 0.3s; }
    .page { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header { background: var(--card); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-size: 20px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .header-logo i { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-actions { display: flex; gap: 4px; align-items: center; }
    .btn-header { padding: 8px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--light); color: var(--text); display: flex; align-items: center; gap: 5px; }
    .btn-icon-only { width: 34px; height: 34px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text); }

    .container { max-width: 520px; margin: 0 auto; padding: 12px; }

    .search-box { background: var(--card); border-radius: 50px; padding: 4px 16px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); margin-bottom: 14px; border: 2px solid var(--border); }
    .search-box input { flex: 1; padding: 11px 0; border: none; font-size: 14px; background: transparent; outline: none; color: var(--text); }

    .gym-card { background: var(--card); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; box-shadow: var(--shadow); cursor: pointer; }
    .gym-card-image { width: 100%; height: 170px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; position: relative; }
    .gym-card-image img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .gym-card-image .ph { font-size: 50px; color: rgba(255,255,255,0.4); }
    .gym-card-badge { position: absolute; top: 10px; right: 10px; background: var(--success); color: white; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700; }
    .gym-card-body { padding: 14px; }
    .gym-card-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .gym-prices { display: flex; gap: 12px; flex-wrap: wrap; }
    .gym-price-item { display: flex; flex-direction: column; }
    .gym-price-value { font-size: 18px; font-weight: 800; color: var(--primary); }
    .gym-price-label { font-size: 10px; color: var(--gray-light); }

    .btn { padding: 13px 18px; border-radius: 50px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.3s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); }
    .btn-sm { width: auto; padding: 8px 12px; font-size: 12px; }

    .tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 12px; flex-wrap: wrap; }
    .tab-btn { padding: 9px 14px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .form-card h3 { font-size: 16px; margin-bottom: 12px; color: var(--text); }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 12px; color: var(--text); }
    .form-control { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--card); color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--primary); }
    textarea.form-control { resize: vertical; min-height: 60px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .images-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .img-box { aspect-ratio: 1; border-radius: 10px; background: var(--light); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); cursor: pointer; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .img-box .del-img { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .img-box.add-box i { font-size: 24px; color: var(--gray-light); }

    .phones-list { display: flex; flex-direction: column; gap: 6px; }
    .phone-row { display: flex; gap: 6px; align-items: center; }
    .phone-row input { flex: 1; }
    .phone-row .del-phone { width: 32px; height: 32px; border-radius: 50%; background: var(--danger); color: white; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .add-phone-btn { margin-top: 6px; padding: 8px; background: var(--light); border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; text-align: center; color: var(--primary); font-weight: 600; font-size: 13px; }

    .members-table { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .members-table-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; font-size: 11px; font-weight: 700; text-align: center; }
    .members-table-row { padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; text-align: center; color: var(--text); }
    .status-badge { display: inline-block; padding: 3px 7px; border-radius: 15px; font-size: 10px; font-weight: 700; }
    .status-paid { background: #D4EDDA; color: #155724; }
    .status-unpaid { background: #F8D7DA; color: #721C24; }

    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); width: 100%; max-width: 520px; border-radius: 24px 24px 0 0; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 10; }
    .modal-header h3 { font-size: 16px; color: var(--text); }
    .modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; color: var(--text-secondary); }
    .modal-body { padding: 14px; color: var(--text); }
    .modal-footer { padding: 10px 14px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }

    .toast { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto; background: var(--dark); color: white; padding: 12px 16px; border-radius: 50px; text-align: center; z-index: 2000; display: none; font-weight: 600; font-size: 13px; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #333; }

    .radio-group { display: flex; gap: 8px; }
    .radio-option { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px; color: var(--text); background: var(--card); }
    .radio-option.selected { border-color: var(--primary); background: rgba(108,92,231,0.08); color: var(--primary); }

    .empty { text-align: center; padding: 30px 15px; color: var(--text-secondary); }
    .empty i { font-size: 40px; opacity: 0.5; margin-bottom: 10px; }

    @media (max-width: 400px) {
      .members-table-header, .members-table-row { grid-template-columns: 1.2fr 0.8fr 0.8fr 0.6fr; font-size: 10px; padding: 8px 6px; }
    }
  </style>
</head>
<body>

<!-- ==================== الصفحات ==================== -->
<div class="page active" id="homePage">
  <div class="header">
    <div class="header-logo"><i class="fas fa-dumbbell"></i> جيماوي</div>
    <div class="header-actions">
      <button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button>
      <button class="btn-header" onclick="goTo('myReq')"><i class="fas fa-clock"></i> طلباتي</button>
      <button class="btn-header" onclick="goTo('profile')"><i class="fas fa-user"></i> حسابي</button>
    </div>
  </div>
  <div class="container">
    <div class="search-box"><i class="fas fa-search" style="color:var(--gray-light);"></i><input type="text" id="searchInput" placeholder="ابحث عن جيم..." oninput="loadGyms()"></div>
    <div id="gymsList"></div>
    <div style="text-align:center;margin-top:12px;"><button class="btn btn-outline btn-sm" onclick="goTo('redeem')">🏋️ دخول الكوتش</button></div>
  </div>
</div>

<div class="page" id="myReqPage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">طلباتي</h2><div></div></div><div class="container" id="myReqContent"></div></div>
<div class="page" id="profilePage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">حسابي</h2><div></div></div><div class="container" id="profileContent"></div></div>
<div class="page" id="registerPage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">تسجيل</h2><div></div></div><div class="container"><div class="form-card" style="text-align:center;"><i class="fas fa-user-circle" style="font-size:48px;color:var(--primary);"></i><h3 style="color:var(--text);margin:10px 0;">أهلاً بك</h3><div class="form-group"><label>الاسم</label><input type="text" id="regName" class="form-control"></div><div class="form-group"><label>الهاتف</label><input type="tel" id="regPhone" class="form-control"></div><button class="btn btn-primary" onclick="saveProfile()">💾 حفظ</button></div></div></div>

<div class="page" id="redeemPage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">دخول الكوتش</h2><div></div></div><div class="container" style="display:flex;align-items:center;justify-content:center;min-height:65vh;"><div class="form-card" style="text-align:center;width:100%;max-width:380px;"><i class="fas fa-key" style="font-size:44px;color:var(--primary);margin-bottom:12px;"></i><h2 style="color:var(--text);">أدخل الكود</h2><input type="text" id="redeemCode" class="form-control" style="text-align:center;font-size:20px;letter-spacing:4px;text-transform:uppercase;margin:14px 0;" placeholder="GYM2026XX" autocomplete="off"><button class="btn btn-primary" onclick="checkCode()">دخول</button></div></div></div>

<div class="page" id="coachPage">
  <div class="header"><h2 id="coachTitle" style="font-size:17px;color:var(--text);">جيمي</h2><div class="header-actions"><button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button><button class="btn-header" onclick="logoutCoach()">🚪 خروج</button></div></div>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('gym')">🏋️ الجيم</button>
      <button class="tab-btn" onclick="switchTab('requests')">🔔 الطلبات <span id="reqBadge" style="display:none;background:var(--danger);color:white;padding:2px 8px;border-radius:10px;font-size:10px;margin-right:2px;">0</span></button>
      <button class="tab-btn" onclick="switchTab('members')">👥 المشتركين</button>
      <button class="tab-btn" onclick="switchTab('sessions')">📅 الحصص</button>
    </div>
    
    <div class="tab-content active" id="tab-gym">
      <div class="form-card">
        <h3>بيانات الجيم</h3>
        <div class="form-group"><label>اسم الجيم *</label><input type="text" id="gymName" class="form-control"></div>
        
        <div class="form-group">
          <label>صور الجيم (للرؤية فقط - لا يمكن حفظها)</label>
          <div class="images-grid" id="imagesGrid"></div>
          <input type="file" id="imageInput" accept="image/*" multiple style="display:none;" onchange="uploadGymImages(this)">
        </div>
        
        <div class="row">
          <div class="form-group"><label>الاشتراك الشهري *</label><input type="number" id="monthlyPrice" class="form-control" placeholder="500"></div>
          <div class="form-group"><label>الاشتراك السنوي</label><input type="number" id="yearlyPrice" class="form-control" placeholder="5000"></div>
        </div>
        <div class="row">
          <div class="form-group"><label>سعر الحصة *</label><input type="number" id="sessionPrice" class="form-control" placeholder="100"></div>
          <div class="form-group"><label>سعر العرض</label><input type="number" id="offerPrice" class="form-control" placeholder="400"></div>
        </div>
        
        <div class="form-group">
          <label>أرقام الكوتش</label>
          <div class="phones-list" id="phonesList"></div>
          <div class="add-phone-btn" onclick="addPhoneField()">+ إضافة رقم</div>
        </div>
        
        <div class="form-group"><label>الموقع</label><input type="text" id="gymLoc" class="form-control" placeholder="مثال: مصر الجديدة"></div>
        <div class="form-group"><label>ملاحظات</label><textarea id="gymNotes" class="form-control" rows="2" placeholder="تفاصيل عن الجيم..."></textarea></div>
        <button class="btn btn-primary" onclick="saveGym()">💾 حفظ التعديلات</button>
      </div>
    </div>
    
    <div class="tab-content" id="tab-requests"><div id="requestsList"></div></div>
    
    <div class="tab-content" id="tab-members">
      <button class="btn btn-success btn-sm" onclick="showAddMember()" style="margin-bottom:8px;">➕ إضافة مشترك</button>
      <div class="search-box" style="margin-bottom:10px;"><i class="fas fa-search" style="color:var(--gray-light);"></i><input type="text" id="memberSearchInput" placeholder="بحث عن مشترك..." oninput="loadMembers()"></div>
      <div id="membersList"></div>
    </div>
    
    <div class="tab-content" id="tab-sessions">
      <div class="form-group"><label>اختر تاريخ</label><input type="date" id="sessionDate" class="form-control" onchange="loadSessions()"></div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <div class="form-card" style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);" id="sessCount">0</div><div style="font-size:12px;">حصص</div></div>
        <div class="form-card" style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);" id="sessTotal">0 ج.م</div><div style="font-size:12px;">إجمالي</div></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="showAddSession()" style="margin-bottom:8px;">➕ حصة جديدة</button>
      <div id="sessionsList"></div>
    </div>
  </div>
</div>

<div class="page" id="adminPage"><div class="header"><h2 style="font-size:17px;color:var(--text);">👑 لوحة المطور</h2><div class="header-actions"><button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button><button class="btn-header" onclick="logoutAdmin()">🚪 خروج</button></div></div><div class="container" id="adminContent"></div></div>

<!-- ==================== المودالات ==================== -->
<div class="modal" id="gymModal"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal('gymModal')">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
<div class="modal" id="confirmModal"><div class="modal-content"><div class="modal-header"><h3 id="confirmTitle"></h3><button class="modal-close" onclick="closeModal('confirmModal')">✕</button></div><div class="modal-body" id="confirmBody"></div><div class="modal-footer"><button class="btn btn-danger" id="confirmYesBtn">نعم</button><button class="btn btn-outline" onclick="closeModal('confirmModal')">إلغاء</button></div></div></div>
<div class="modal" id="passcodeModal"><div class="modal-content"><div class="modal-header"><h3>🔒 دخول المطور</h3><button class="modal-close" onclick="closeModal('passcodeModal')">✕</button></div><div class="modal-body" style="text-align:center;"><p style="color:var(--text-secondary);">كلمة المرور (6 أرقام)</p><div style="display:flex;gap:6px;justify-content:center;margin:14px 0;"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc1" oninput="nextPass(this,'pc2')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc2" oninput="nextPass(this,'pc3')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc3" oninput="nextPass(this,'pc4')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc4" oninput="nextPass(this,'pc5')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc5" oninput="nextPass(this,'pc6')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc6"></div></div><div class="modal-footer"><button class="btn btn-primary" onclick="verifyPass()">دخول</button><button class="btn btn-outline" onclick="closeModal('passcodeModal')">إلغاء</button></div></div></div>

<div class="toast" id="toast"></div>

// ==================== CLOUDINARY UPLOAD ====================
async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY.uploadPreset);
  
  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    console.log('Cloudinary response:', data);
    if (data.secure_url) return data.secure_url;
    if (data.error) { console.error('Cloudinary error:', data.error.message); return null; }
    return null;
  } catch(e) {
    console.error('Upload failed:', e.message);
    return null;
  }
}

function renderImages() {
  const g = G.gym;

    g.images.forEach((img, i) => {
      h += `<div class="img-box"><img src="${img}" alt="صورة ${i+1}" oncontextmenu="return false;"><button class="del-img" onclick="event.stopPropagation();delImg(${i})">✕</button></div>`;
    });
  }
  h += `<div class="img-box add-box" onclick="document.getElementById('imageInput').click()"><i class="fas fa-plus"></i></div>`;
  grid.innerHTML = h;
}

async function uploadGymImages(input) {
  if (!G.gym.images) G.gym.images = [];
  if (G.gym.images.length >= 5) { T('أقصى حد 5 صور', 'warning'); input.value = ''; return; }
  
  const files = Array.from(input.files).slice(0, 5 - G.gym.images.length);
  
  for (const f of files) {
    T('⏳ جاري رفع الصورة...');
    const url = await uploadToCloudinary(f);
    if (url) {
      G.gym.images.push(url);
      renderImages();
      T('✅ تم رفع الصورة بنجاح');
    } else {
      T('❌ فشل رفع الصورة - تأكد من الاتصال', 'error');
    }
  }
  input.value = '';
}

  showConfirm('حذف الصورة', '<p>متأكد من حذف الصورة؟</p>', () => {

  try{ const snap=await db.collection('requests').where('gymId','==',G.gid).where('status','==','pending').get(); snap.forEach(doc=>reqs.push({id:doc.id,...doc.data()})); } catch(e){ reqs=LDB.getK('requests',[]).filter(r=>r.gymId===G.gid&&r.status==='pending'); }
  const c=document.getElementById('requestsList'); if(!reqs.length){c.innerHTML='<div class="empty"><i class="fas fa-inbox"></i><h4>لا طلبات معلقة</h4></div>';return;}
  c.innerHTML=reqs.map(r=>`<div style="background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;"><div style="display:flex;justify-content:space-between;"><strong style="color:var(--text);">${r.name}</strong><span style="font-size:10px;color:var(--text-secondary);">${fmt(r.created)}</span></div><div style="color:var(--text-secondary);font-size:11px;margin:3px 0;">📞 ${r.phone} | ${r.subType==='monthly'?'شهري':'سنوي'}</div><div style="display:flex;gap:4px;"><button class="btn btn-success btn-sm" onclick='accReq("${r.id}")'>✅ قبول</button><button class="btn btn-danger btn-sm" onclick='rejReq("${r.id}")'>❌ رفض</button></div></div>`).join('');
}
async function accReq(rid){
  let req; try{ const snap=await db.collection('requests').doc(rid).get(); req={id:snap.id,...snap.data()}; } catch(e){ req=LDB.getK('requests',[]).find(r=>r.id===rid); }
  if(!req)return;
  const ms=LDB.getK('members',[]);
  const dup=ms.find(m=>m.gymId===G.gid&&m.phone===req.phone&&m.active&&!m.leftByUser);
  if(dup){ T('⚠️ هذا الرقم موجود بالفعل كمشترك نشط في الجيم','error'); return; }
  const sd=new Date(); const dd=new Date(sd); req.subType==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365);
  const ext=ms.find(m=>m.gymId===G.gid&&m.phone===req.phone&&m.leftByUser);
  if(ext){ext.type=req.subType;ext.start=sd.toISOString();ext.due=dd.toISOString();ext.paid=true;ext.leftByUser=false;ext.active=true;LDB.setK('members',ms);try{await db.collection('members').doc(ext.id).set(ext,{merge:true});}catch(e){}}
  else {const mem={id:uid(),gymId:G.gid,gymName:G.gym.name,name:req.name,phone:req.phone,type:req.subType,start:sd.toISOString(),due:dd.toISOString(),monthlyPrice:G.gym.monthlyPrice,yearlyPrice:G.gym.yearlyPrice,paid:true,active:true,created:new Date().toISOString()};ms.push(mem);LDB.setK('members',ms);try{await db.collection('members').doc(mem.id).set(mem);}catch(e){}}
  try{await db.collection('requests').doc(rid).update({status:'accepted'});}catch(e){const lreqs=LDB.getK('requests',[]);const i=lreqs.findIndex(r=>r.id===rid);if(i>=0){lreqs[i].status='accepted';LDB.setK('requests',lreqs);}}
  loadRequests();loadReqCount();T('تم قبول الطلب');
}
async function rejReq(rid){ showConfirm('رفض الطلب','<p style="color:var(--text-secondary);">متأكد من رفض هذا الطلب؟</p>',async()=>{try{await db.collection('requests').doc(rid).update({status:'rejected'});}catch(e){const lreqs=LDB.getK('requests',[]);const i=lreqs.findIndex(r=>r.id===rid);if(i>=0){lreqs[i].status='rejected';LDB.setK('requests',lreqs);}}loadRequests();loadReqCount();T('تم الرفض');}); }

function loadMembers(){
  let ms = LDB.getK('members',[]).filter(m => m.gymId === G.gid && m.active && !m.leftByUser && !m.expelledByCoach);
  const s = (document.getElementById('memberSearchInput')?.value||'').toLowerCase();
  if(s) ms = ms.filter(m => m.name.toLowerCase().includes(s)||m.phone.includes(s));
  const c = document.getElementById('membersList');
  if(!ms.length){c.innerHTML='<div class="empty"><i class="fas fa-users"></i><h4>لا مشتركين</h4></div>';return;}
  c.innerHTML=`<div class="members-table"><div class="members-table-header"><span>الاسم</span><span>النوع</span><span>الاستحقاق</span><span>الحالة</span></div>${ms.map(m=>{const ok=m.paid&&!exp(m.due);return`<div class="members-table-row" onclick='memAct("${m.id}")'><span style="font-weight:600;">${m.name}</span><span style="font-size:10px;">${m.type==='monthly'?'شهري':'سنوي'}</span><span style="font-size:10px;">${fmt(m.due)}</span><span><span class="status-badge ${ok?'status-paid':'status-unpaid'}">${ok?'مدفوع':'متأخر'}</span></span></div>`;}).join('')}</div>`;
}
function memAct(mid){ const ms=LDB.getK('members',[]); G.curMem=ms.find(m=>m.id===mid); const ok=G.curMem.paid&&!exp(G.curMem.due); const canRenew=!G.curMem.paid||exp(G.curMem.due); document.getElementById('modalTitle').textContent='تفاصيل المشترك'; document.getElementById('modalBody').innerHTML=`<div style="text-align:center;"><i class="fas fa-user-circle" style="font-size:40px;color:var(--primary);"></i><h3 style="color:var(--text);">${G.curMem.name}</h3><p style="color:var(--text-secondary);">📞 ${G.curMem.phone}</p><div style="background:var(--light);border-radius:8px;padding:10px;text-align:right;"><div style="display:flex;justify-content:space-between;"><span>النوع</span><strong>${G.curMem.type==='monthly'?'شهري':'سنوي'}</strong></div><div style="display:flex;justify-content:space-between;"><span>الاستحقاق</span><strong>${fmt(G.curMem.due)}</strong></div><span class="status-badge ${ok?'status-paid':'status-unpaid'}">${ok?'مدفوع':'متأخر'}</span></div></div>`; let ft=''; if(canRenew)ft=`<button class="btn btn-success" onclick="renewMem()">🔄 تجديد</button>`; else ft=`<div style="padding:6px;background:#E8E8E8;border-radius:6px;text-align:center;font-size:12px;margin-bottom:4px;">لا يمكن التجديد قبل انتهاء الاشتراك</div>`; ft+=`<button class="btn btn-outline btn-sm" onclick='showEditMember("${G.curMem.id}")'>✏️ تعديل</button><button class="btn btn-danger btn-sm" onclick="expelMem()">❌ طرد</button><button class="btn btn-outline" onclick="closeModal('gymModal')">إغلاق</button>`; document.getElementById('modalFooter').innerHTML=ft; openModal('gymModal'); }
function showEditMember(mid){ const ms=LDB.getK('members',[]); const m=ms.find(m=>m.id===mid); closeModal('gymModal'); document.getElementById('modalTitle').textContent='تعديل بيانات المشترك'; document.getElementById('modalBody').innerHTML=`<div class="form-group"><label>الاسم</label><input type="text" id="editMemName" class="form-control" value="${m.name}"></div><div class="form-group"><label>الهاتف</label><input type="tel" id="editMemPhone" class="form-control" value="${m.phone}"></div>`; document.getElementById('modalFooter').innerHTML=`<button class="btn btn-primary" onclick='saveEditMember("${mid}")'>💾 حفظ</button><button class="btn btn-outline" onclick="closeModal('gymModal')">إلغاء</button>`; openModal('gymModal'); }
function saveEditMember(mid){ const ms=LDB.getK('members',[]); const m=ms.find(m=>m.id===mid); const nn=document.getElementById('editMemName').value.trim(),np=document.getElementById('editMemPhone').value.trim(); if(!nn){T('اكتب الاسم','error');return;} const dup=ms.find(m=>m.gymId===G.gid&&m.phone===np&&m.id!==mid&&m.active&&!m.leftByUser); if(dup){T('الرقم مستخدم لمشترك آخر','error');return;} m.name=nn;m.phone=np;LDB.setK('members',ms);syncMember(m);closeModal('gymModal');loadMembers();T('تم التعديل'); }
function renewMem(){ const m=G.curMem; if(m.paid&&!exp(m.due)){T('الاشتراك لسه ساري - لا يمكن التجديد','error');return;} document.getElementById('modalTitle').textContent='تجديد الاشتراك'; document.getElementById('modalBody').innerHTML=`<p style="text-align:center;color:var(--text);"><strong>${m.name}</strong></p><div class="radio-group"><div class="radio-option selected" id="renOptMonthly" onclick="selectRenType('monthly')">📅 شهري<span style="display:block;font-size:10px;">${m.monthlyPrice} ج.م</span></div>${G.gym.yearlyPrice?`<div class="radio-option" id="renOptYearly" onclick="selectRenType('yearly')">📆 سنوي<span style="display:block;font-size:10px;">${m.yearlyPrice||G.gym.yearlyPrice} ج.م</span></div>`:''}</div>`; document.getElementById('modalFooter').innerHTML=`<button class="btn btn-success" onclick="confirmRenew()">✅ تأكيد التجديد</button><button class="btn btn-outline" onclick='memAct("${m.id}")'>رجوع</button>`; G.subType='monthly'; openModal('gymModal'); }
function selectRenType(t){ G.subType=t; document.querySelectorAll('#modalBody .radio-option').forEach(o=>o.classList.remove('selected')); document.getElementById(t==='monthly'?'renOptMonthly':'renOptYearly').classList.add('selected'); }
function confirmRenew(){ const ms=LDB.getK('members',[]); const m=ms.find(m=>m.id===G.curMem.id); const dd=new Date(); G.subType==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365); m.due=dd.toISOString();m.paid=true;m.type=G.subType;LDB.setK('members',ms);syncMember(m);closeModal('gymModal');loadMembers();T('تم التجديد'); }
function expelMem(){ showConfirm('طرد المشترك',`<p style="color:var(--text-secondary);">هل أنت متأكد من طرد <strong>${G.curMem.name}</strong>؟</p>`,()=>{ const ms=LDB.getK('members',[]); const m=ms.find(m=>m.id===G.curMem.id); m.active=false;m.expelledByCoach=true;m.expelledAt=new Date().toISOString();LDB.setK('members',ms);syncMember(m);closeModal('gymModal');loadMembers();T('تم طرد المشترك'); }); }
async function syncMember(m){ try { await db.collection('members').doc(m.id).set(m,{merge:true}); } catch(e){} }
function showAddMember(){ document.getElementById('modalTitle').textContent='إضافة مشترك'; document.getElementById('modalBody').innerHTML=`<div class="form-group"><label>الاسم *</label><input type="text" id="addMemName" class="form-control"></div><div class="form-group"><label>الهاتف *</label><input type="tel" id="addMemPhone" class="form-control"></div><div class="form-group"><label>النوع</label><select id="addMemType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div><div class="form-group"><label>تاريخ الدفع</label><input type="date" id="addMemDate" class="form-control"></div>`; document.getElementById('modalFooter').innerHTML='<button class="btn btn-success" onclick="addMem()">➕ إضافة</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>'; document.getElementById('addMemDate').value=new Date().toISOString().split('T')[0]; openModal('gymModal'); }
function addMem(){ const n=document.getElementById('addMemName').value.trim(),p=document.getElementById('addMemPhone').value.trim(),t=document.getElementById('addMemType').value,d=document.getElementById('addMemDate').value; if(!n||!p){T('اكتب البيانات','error');return;} const ms=LDB.getK('members',[]); if(ms.find(m=>m.gymId===G.gid&&m.phone===p&&m.active&&!m.leftByUser)){T('⚠️ هذا الرقم موجود بالفعل كمشترك نشط','error');return;} const dd=new Date(d);t==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365); const mem={id:uid(),gymId:G.gid,gymName:G.gym.name,name:n,phone:p,type:t,start:new Date(d).toISOString(),due:dd.toISOString(),monthlyPrice:G.gym.monthlyPrice,yearlyPrice:G.gym.yearlyPrice,paid:true,active:true,created:new Date().toISOString()}; ms.push(mem);LDB.setK('members',ms);syncMember(mem);closeModal('gymModal');loadMembers();T('تم إضافة المشترك'); }
function loadSessions(){ const date=document.getElementById('sessionDate').value||new Date().toISOString().split('T')[0]; const ss=LDB.getK('sessions',[]).filter(s=>s.gymId===G.gid&&s.date===date); const total=ss.reduce((a,s)=>a+s.price,0); document.getElementById('sessCount').textContent=ss.length; document.getElementById('sessTotal').textContent=total+' ج.م'; const c=document.getElementById('sessionsList'); if(!ss.length){c.innerHTML='<div class="empty"><i class="fas fa-calendar"></i><h4>لا حصص</h4></div>';return;} c.innerHTML=ss.map(s=>`<div style="background:var(--card);border-radius:8px;padding:8px;margin-bottom:4px;display:flex;justify-content:space-between;"><span style="color:var(--text);">${s.name}</span><span style="color:var(--primary);font-weight:700;">${s.price} ج.م</span></div>`).join(''); }
function showAddSession(){ document.getElementById('modalTitle').textContent='حصة جديدة'; document.getElementById('modalBody').innerHTML=`<div class="form-group"><label>المتدرب</label><input type="text" id="sessName" class="form-control"></div><div class="form-group"><label>السعر</label><input type="number" id="sessPrice" class="form-control" value="${G.gym.sessionPrice||0}"></div>`; document.getElementById('modalFooter').innerHTML='<button class="btn btn-primary" onclick="addSess()">تسجيل</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>'; openModal('gymModal'); }
function addSess(){ const n=document.getElementById('sessName').value.trim(),p=+document.getElementById('sessPrice').value; if(!n){T('اكتب الاسم','error');return;} const ss=LDB.getK('sessions',[]); ss.push({id:uid(),gymId:G.gid,name:n,price:p,date:new Date().toISOString().split('T')[0],created:new Date().toISOString()}); LDB.setK('sessions',ss); closeModal('gymModal');loadSessions();T('تم تسجيل الحصة'); }
function logoutCoach(){ sessionStorage.removeItem('coachId'); G.gym=null; G.gid=null; goTo('home'); }

// ==================== ADMIN ====================
async function loadAdmin(){ await syncGymsFromFirebase(); const gs=LDB.getK('gyms',[]); const total=gs.length; const act=gs.filter(g=>g.active&&!exp(g.subEnd)).length; const expiring=gs.filter(g=>g.active&&g.subEnd&&daysR(g.subEnd)<=3&&daysR(g.subEnd)>0).length; document.getElementById('adminContent').innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;"><div class="form-card" style="text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);">${total}</div><div style="font-size:11px;">جيم</div></div><div class="form-card" style="text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--success);">${act}</div><div style="font-size:11px;">نشط</div></div><div class="form-card" style="text-align:center;"><div style="font-size:22px;font-weight:800;color:${expiring>0?'var(--danger)':'var(--gray)'};">${expiring}</div><div style="font-size:11px;">قريب الانتهاء</div></div></div><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><h3 style="color:var(--text);">الجيمات</h3><button class="btn btn-primary btn-sm" onclick="newGym()">+ جيم</button></div>${gs.map(g=>{const ok=g.active&&!exp(g.subEnd);const r=daysR(g.subEnd)||0;return`<div style="background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;box-shadow:var(--shadow);"><div style="display:flex;justify-content:space-between;"><strong style="color:var(--text);">${g.name}</strong><span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${ok?'#D4EDDA':'#F8D7DA'};color:${ok?'#155724':'#721C24'};">${ok?'نشط':'منتهي'}</span></div><div style="color:var(--text-secondary);font-size:11px;margin:3px 0;">🔑 ${g.redeemCode} | متبقي ${r} يوم</div><div style="display:flex;gap:4px;"><button class="btn btn-success btn-sm" onclick='renGym("${g.id}")'>تجديد</button><button class="btn ${g.active?'btn-danger':'btn-success'} btn-sm" onclick='togGym("${g.id}")'>${g.active?'تعطيل':'تفعيل'}</button></div></div>`}).join('')}`; }
function newGym(){ document.getElementById('modalTitle').textContent='جيم جديد'; document.getElementById('modalBody').innerHTML=`<div class="form-group"><label>الاسم</label><input type="text" id="ngName" class="form-control"></div><div class="form-group"><label>الكود</label><input type="text" id="ngCode" class="form-control" style="text-transform:uppercase;"></div><div class="row"><div class="form-group"><label>النوع</label><select id="ngType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div><div class="form-group"><label>تاريخ البداية</label><input type="date" id="ngDate" class="form-control"></div></div>`; document.getElementById('modalFooter').innerHTML='<button class="btn btn-primary" onclick="createGym()">إنشاء</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>'; document.getElementById('ngDate').value=new Date().toISOString().split('T')[0]; openModal('gymModal'); }
async function createGym(){ const n=document.getElementById('ngName').value.trim(),co=document.getElementById('ngCode').value.trim().toUpperCase(),t=document.getElementById('ngType').value,d=document.getElementById('ngDate').value; if(!n||!co){T('اكتب البيانات','error');return;} const gs=LDB.getK('gyms',[]); if(gs.find(g=>g.redeemCode===co)){T('الكود مستخدم','error');return;} const dd=new Date(d);t==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365); const gym={id:uid(),name:n,redeemCode:co,active:true,images:[],monthlyPrice:0,yearlyPrice:null,sessionPrice:0,offerPrice:null,phones:[],location:'',notes:'',subType:t,subStart:new Date(d).toISOString(),subEnd:dd.toISOString(),created:new Date().toISOString()}; gs.push(gym);LDB.setK('gyms',gs); try{await db.collection('gyms').doc(gym.id).set(gym);}catch(e){} closeModal('gymModal');loadAdmin();T('تم الإنشاء'); }
function renGym(id){ G.renGym=id; document.getElementById('modalTitle').textContent='تجديد'; document.getElementById('modalBody').innerHTML=`<div class="form-group"><label>النوع</label><select id="renType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div><div class="form-group"><label>تاريخ البداية</label><input type="date" id="renDate" class="form-control"></div>`; document.getElementById('modalFooter').innerHTML='<button class="btn btn-success" onclick="doRenew()">تأكيد</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>'; document.getElementById('renDate').value=new Date().toISOString().split('T')[0]; openModal('gymModal'); }
async function doRenew(){ const gs=LDB.getK('gyms',[]); const g=gs.find(g=>g.id===G.renGym); const t=document.getElementById('renType').value,d=document.getElementById('renDate').value; const dd=new Date(d);t==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365); g.subType=t;g.subStart=new Date(d).toISOString();g.subEnd=dd.toISOString();g.active=true;LDB.setK('gyms',gs); try{await db.collection('gyms').doc(g.id).update({subType:t,subStart:g.subStart,subEnd:g.subEnd,active:true});}catch(e){} closeModal('gymModal');loadAdmin();T('تم التجديد'); }
async function togGym(id){ const gs=LDB.getK('gyms',[]); const g=gs.find(g=>g.id===id); g.active=!g.active;LDB.setK('gyms',gs); try{await db.collection('gyms').doc(id).update({active:g.active});}catch(e){} loadAdmin();T(g.active?'تم التفعيل':'تم التعطيل'); }
function logoutAdmin(){ sessionStorage.removeItem('admin'); goTo('home'); }

// ==================== INIT ====================
(async function(){
  const gs = LDB.getK('gyms', []);
  if (gs.length === 0) { try { const snap = await db.collection('gyms').get(); const fbgyms = []; snap.forEach(doc => fbgyms.push({ id: doc.id, ...doc.data() })); if (fbgyms.length > 0) LDB.setK('gyms', fbgyms); } catch(e) {} }
  if (localStorage.getItem('darkMode')==='1') { document.body.classList.add('dark'); document.querySelectorAll('.btn-icon-only i').forEach(i => i.className = 'fas fa-sun'); }
  if (sessionStorage.getItem('admin')==='1') { goTo('admin'); loadAdmin(); return; }
  const cid = sessionStorage.getItem('coachId');
  if (cid) { const gs = LDB.getK('gyms', []); const g = gs.find(g => g.id===cid); if (g && g.active && !exp(g.subEnd)) { G.gym=g; G.gid=g.id; document.getElementById('coachTitle').textContent=g.name; goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount(); listenForNewRequests(); return; } sessionStorage.removeItem('coachId'); }
  goTo('home'); loadGyms();
  setInterval(syncGymsFromFirebase, 60000);
})();
</script>
