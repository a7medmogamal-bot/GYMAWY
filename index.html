  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6C5CE7">
  <title>جيماوي - منصة الجيمات</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    :root {
      --primary: #6C5CE7; --primary-dark: #5A4BD1; --primary-light: #A29BFE;
      --secondary: #00CEC9; --success: #00B894; --danger: #FF6B6B; --warning: #FDCB6E;
      --dark: #2D3436; --gray: #636E72; --gray-light: #B2BEC3;
      --light: #F8F9FA; --white: #FFFFFF; --border: #E9ECEF;
      --shadow: 0 2px 15px rgba(0,0,0,0.08); --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
      --radius: 20px; --radius-sm: 12px;
      --bg: #F0F2F5; --card: #FFFFFF; --text: #2D3436; --text-secondary: #636E72;
    }

    body.dark {
      --bg: #1A1A2E; --card: #16213E; --text: #E0E0E0; --text-secondary: #A0A0A0;
      --border: #2A2A4A; --shadow: 0 2px 15px rgba(0,0,0,0.3);
      --light: #1F2B47; --white: #16213E; --gray: #A0A0A0; --gray-light: #6B7280;
    }

    body { background: var(--bg); min-height: 100vh; overflow-x: hidden; color: var(--text); transition: all 0.3s; }
    .page { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header { background: var(--card); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-size: 20px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .header-logo i { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-actions { display: flex; gap: 4px; align-items: center; }
    .btn-header { padding: 8px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--light); color: var(--text); display: flex; align-items: center; gap: 5px; }
    .btn-icon-only { width: 34px; height: 34px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text); }

    .container { max-width: 520px; margin: 0 auto; padding: 12px; }

    .search-box { background: var(--card); border-radius: 50px; padding: 4px 16px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); margin-bottom: 14px; border: 2px solid var(--border); }
    .search-box input { flex: 1; padding: 11px 0; border: none; font-size: 14px; background: transparent; outline: none; color: var(--text); }

    .gym-card { background: var(--card); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; box-shadow: var(--shadow); cursor: pointer; }
    .gym-card-image { width: 100%; height: 170px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; position: relative; }
    .gym-card-image img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .gym-card-image .ph { font-size: 50px; color: rgba(255,255,255,0.4); }
    .gym-card-badge { position: absolute; top: 10px; right: 10px; background: var(--success); color: white; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700; }
    .gym-card-body { padding: 14px; }
    .gym-card-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .gym-prices { display: flex; gap: 12px; flex-wrap: wrap; }
    .gym-price-item { display: flex; flex-direction: column; }
    .gym-price-value { font-size: 18px; font-weight: 800; color: var(--primary); }
    .gym-price-label { font-size: 10px; color: var(--gray-light); }

    .loading-spinner { text-align: center; padding: 30px; }
    .loading-spinner i { font-size: 30px; color: var(--primary); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn { padding: 13px 18px; border-radius: 50px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.3s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); }
    .btn-sm { width: auto; padding: 8px 12px; font-size: 12px; }

    .tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 12px; flex-wrap: wrap; }
    .tab-btn { padding: 9px 14px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .form-card h3 { font-size: 16px; margin-bottom: 12px; color: var(--text); }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 12px; color: var(--text); }
    .form-control { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--card); color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--primary); }
    textarea.form-control { resize: vertical; min-height: 60px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .images-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .img-box { aspect-ratio: 1; border-radius: 10px; background: var(--light); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); cursor: pointer; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-drag: none; }
    .img-box .del-img { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .img-box.add-box i { font-size: 24px; color: var(--gray-light); }

    .phones-list { display: flex; flex-direction: column; gap: 6px; }
    .phone-row { display: flex; gap: 6px; align-items: center; }
    .phone-row input { flex: 1; }
    .phone-row .del-phone { width: 32px; height: 32px; border-radius: 50%; background: var(--danger); color: white; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .add-phone-btn { margin-top: 6px; padding: 8px; background: var(--light); border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; text-align: center; color: var(--primary); font-weight: 600; font-size: 13px; }

    .members-table { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .members-table-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; font-size: 11px; font-weight: 700; text-align: center; }
    .members-table-row { padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; text-align: center; color: var(--text); }
    .status-badge { display: inline-block; padding: 3px 7px; border-radius: 15px; font-size: 10px; font-weight: 700; }
    .status-paid { background: #D4EDDA; color: #155724; }
    .status-unpaid { background: #F8D7DA; color: #721C24; }

    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); width: 100%; max-width: 520px; border-radius: 24px 24px 0 0; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 10; }
    .modal-header h3 { font-size: 16px; color: var(--text); }
    .modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; color: var(--text-secondary); }
    .modal-body { padding: 14px; color: var(--text); }
    .modal-footer { padding: 10px 14px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }

    .toast { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto; background: var(--dark); color: white; padding: 12px 16px; border-radius: 50px; text-align: center; z-index: 2000; display: none; font-weight: 600; font-size: 13px; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #333; }

    .radio-group { display: flex; gap: 8px; }
    .radio-option { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px; color: var(--text); background: var(--card); }
    .radio-option.selected { border-color: var(--primary); background: rgba(108,92,231,0.08); color: var(--primary); }

    .empty { text-align: center; padding: 30px 15px; color: var(--text-secondary); }
    .empty i { font-size: 40px; opacity: 0.5; margin-bottom: 10px; }

    @media (max-width: 400px) {
      .members-table-header, .members-table-row { grid-template-columns: 1.2fr 0.8fr 0.8fr 0.6fr; font-size: 10px; padding: 8px 6px; }
    }
  </style>
</head>
<body>

<!-- ==================== الصفحات ==================== -->
<div class="page active" id="homePage">
  <div class="header">
    <div class="header-logo"><i class="fas fa-dumbbell"></i> جيماوي</div>
    <div class="header-actions">
      <button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button>
      <button class="btn-header" onclick="goTo('myReq')"><i class="fas fa-clock"></i> طلباتي</button>
      <button class="btn-header" onclick="goTo('profile')"><i class="fas fa-user"></i> حسابي</button>
    </div>
  </div>
  <div class="container">
    <div class="search-box"><i class="fas fa-search" style="color:var(--gray-light);"></i><input type="text" id="searchInput" placeholder="ابحث عن جيم..." oninput="loadGyms()"></div>
    <div id="gymsList"><div class="loading-spinner"><i class="fas fa-spinner"></i><p>جاري تحميل الجيمات...</p></div></div>
    <div style="text-align:center;margin-top:12px;"><button class="btn btn-outline btn-sm" onclick="goTo('redeem')">🏋️ دخول الكوتش</button></div>
  </div>
</div>

<div class="page" id="myReqPage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">طلباتي</h2><div></div></div><div class="container" id="myReqContent"></div></div>
<div class="page" id="profilePage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">حسابي</h2><div></div></div><div class="container" id="profileContent"></div></div>
<div class="page" id="registerPage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">تسجيل</h2><div></div></div><div class="container"><div class="form-card" style="text-align:center;"><i class="fas fa-user-circle" style="font-size:48px;color:var(--primary);"></i><h3 style="color:var(--text);margin:10px 0;">أهلاً بك</h3><div class="form-group"><label>الاسم</label><input type="text" id="regName" class="form-control"></div><div class="form-group"><label>الهاتف</label><input type="tel" id="regPhone" class="form-control"></div><button class="btn btn-primary" onclick="saveProfile()">💾 حفظ</button></div></div></div>

<div class="page" id="redeemPage"><div class="header"><button class="btn-header" onclick="goTo('home')">⬅ رجوع</button><h2 style="font-size:17px;color:var(--text);">دخول الكوتش</h2><div></div></div><div class="container" style="display:flex;align-items:center;justify-content:center;min-height:65vh;"><div class="form-card" style="text-align:center;width:100%;max-width:380px;"><i class="fas fa-key" style="font-size:44px;color:var(--primary);margin-bottom:12px;"></i><h2 style="color:var(--text);">أدخل الكود</h2><input type="text" id="redeemCode" class="form-control" style="text-align:center;font-size:20px;letter-spacing:4px;text-transform:uppercase;margin:14px 0;" placeholder="GYM2026XX" autocomplete="off"><button class="btn btn-primary" onclick="checkCode()">دخول</button></div></div></div>

<div class="page" id="coachPage">
  <div class="header"><h2 id="coachTitle" style="font-size:17px;color:var(--text);">جيمي</h2><div class="header-actions"><button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button><button class="btn-header" onclick="logoutCoach()">🚪 خروج</button></div></div>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('gym')">🏋️ الجيم</button>
      <button class="tab-btn" onclick="switchTab('requests')">🔔 الطلبات <span id="reqBadge" style="display:none;background:var(--danger);color:white;padding:2px 8px;border-radius:10px;font-size:10px;margin-right:2px;">0</span></button>
      <button class="tab-btn" onclick="switchTab('members')">👥 المشتركين</button>
      <button class="tab-btn" onclick="switchTab('sessions')">📅 الحصص</button>
    </div>
    
    <div class="tab-content active" id="tab-gym">
      <div class="form-card">
        <h3>بيانات الجيم</h3>
        <div class="form-group"><label>اسم الجيم *</label><input type="text" id="gymName" class="form-control"></div>
        <div class="form-group"><label>صور الجيم (للرؤية فقط)</label><div class="images-grid" id="imagesGrid"></div><input type="file" id="imageInput" accept="image/*" multiple style="display:none;" onchange="uploadGymImages(this)"></div>
        <div class="row"><div class="form-group"><label>شهري *</label><input type="number" id="monthlyPrice" class="form-control"></div><div class="form-group"><label>سنوي</label><input type="number" id="yearlyPrice" class="form-control"></div></div>
        <div class="row"><div class="form-group"><label>الحصة *</label><input type="number" id="sessionPrice" class="form-control"></div><div class="form-group"><label>عرض</label><input type="number" id="offerPrice" class="form-control"></div></div>
        <div class="form-group"><label>أرقام الكوتش</label><div class="phones-list" id="phonesList"></div><div class="add-phone-btn" onclick="addPhoneField()">+ إضافة رقم</div></div>
        <div class="form-group"><label>الموقع</label><input type="text" id="gymLoc" class="form-control"></div>
        <div class="form-group"><label>ملاحظات</label><textarea id="gymNotes" class="form-control" rows="2"></textarea></div>
        <button class="btn btn-primary" onclick="saveGym()">💾 حفظ</button>
      </div>
    </div>
    
    <div class="tab-content" id="tab-requests"><div id="requestsList"></div></div>
    <div class="tab-content" id="tab-members"><button class="btn btn-success btn-sm" onclick="showAddMember()" style="margin-bottom:8px;">➕ إضافة</button><input type="text" id="memberSearchInput" class="form-control" placeholder="بحث عن مشترك..." oninput="loadMembers()" style="margin-bottom:8px;"><div id="membersList"></div></div>
    <div class="tab-content" id="tab-sessions"><div class="form-group"><label>تاريخ</label><input type="date" id="sessionDate" class="form-control" onchange="loadSessions()"></div><div style="display:flex;gap:8px;margin-bottom:8px;"><div class="form-card" style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);" id="sessCount">0</div><div>حصص</div></div><div class="form-card" style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);" id="sessTotal">0 ج.م</div><div>إجمالي</div></div></div><button class="btn btn-primary btn-sm" onclick="showAddSession()" style="margin-bottom:8px;">➕ حصة</button><div id="sessionsList"></div></div>
  </div>
</div>

<div class="page" id="adminPage"><div class="header"><h2 style="font-size:17px;color:var(--text);">👑 لوحة المطور</h2><div class="header-actions"><button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button><button class="btn-header" onclick="logoutAdmin()">🚪 خروج</button></div></div><div class="container" id="adminContent"></div></div>

<!-- مودالات -->
<div class="modal" id="gymModal"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal('gymModal')">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
<div class="modal" id="confirmModal"><div class="modal-content"><div class="modal-header"><h3 id="confirmTitle"></h3><button class="modal-close" onclick="closeModal('confirmModal')">✕</button></div><div class="modal-body" id="confirmBody"></div><div class="modal-footer"><button class="btn btn-danger" id="confirmYesBtn">نعم</button><button class="btn btn-outline" onclick="closeModal('confirmModal')">إلغاء</button></div></div></div>
<div class="modal" id="passcodeModal"><div class="modal-content"><div class="modal-header"><h3>🔒 دخول المطور</h3><button class="modal-close" onclick="closeModal('passcodeModal')">✕</button></div><div class="modal-body" style="text-align:center;"><p>كلمة المرور</p><div style="display:flex;gap:6px;justify-content:center;margin:14px 0;"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc1" oninput="nextPass(this,'pc2')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc2" oninput="nextPass(this,'pc3')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc3" oninput="nextPass(this,'pc4')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc4" oninput="nextPass(this,'pc5')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc5" oninput="nextPass(this,'pc6')"><input type="text" class="form-control" maxlength="1" style="width:44px;height:50px;text-align:center;font-size:22px;" id="pc6"></div></div><div class="modal-footer"><button class="btn btn-primary" onclick="verifyPass()">دخول</button><button class="btn btn-outline" onclick="closeModal('passcodeModal')">إلغاء</button></div></div></div>

<div class="toast" id="toast"></div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
  apiKey: "AIzaSyC6WcH6mwd-I_vT9RwMNC07Dg3qp7sB66Q",
  authDomain: "gymawy-platform.firebaseapp.com",
  projectId: "gymawy-platform",
  storageBucket: "gymawy-platform.firebasestorage.app",
  messagingSenderId: "521123423571",
  appId: "1:521123423571:web:a9c567c62ec48877bb2da6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

const CLOUDINARY = { cloudName: 'di5z4lzwv', uploadPreset: 'gymawy_upload' };

// ==================== STATE ====================
let G = { gym: null, gid: null, selGym: null, curMem: null, subType: 'monthly', pendGym: null, allGyms: [] };
let confirmCB = null;

// ==================== HELPERS ====================
function T(msg, type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+type; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3000); }
function goTo(p) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.getElementById(p+'Page').classList.add('active'); if(p==='home')loadGyms(); if(p==='profile')loadProfile(); if(p==='myReq')loadMyReqs(); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function fmt(d) { if(!d)return''; return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'}); }
function exp(d) { return new Date(d) < new Date(); }
function daysR(d) { return Math.ceil((new Date(d)-new Date())/(86400000)); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2); }
function showConfirm(title, msg, cb) { document.getElementById('confirmTitle').textContent=title; document.getElementById('confirmBody').innerHTML=msg; confirmCB=cb; document.getElementById('confirmYesBtn').onclick=()=>{closeModal('confirmModal');if(confirmCB)confirmCB();}; openModal('confirmModal'); }

// ==================== CLOUDINARY ====================
async function uploadToCloudinary(file) {
  const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLOUDINARY.uploadPreset);
  try { const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`, { method: 'POST', body: fd }); const d = await r.json(); return d.secure_url || null; } catch(e) { return null; }
}

// ==================== GYMS (ALL FROM FIREBASE) ====================
async function loadGyms() {
  const c = document.getElementById('gymsList');
  c.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
  
  try {
    const snap = await db.collection('gyms').get();
    G.allGyms = []; snap.forEach(doc => G.allGyms.push({ id: doc.id, ...doc.data() }));
    
    const s = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let f = G.allGyms.filter(g => g.active && g.subEnd && !exp(g.subEnd));
    if(s) f = f.filter(g => g.name.toLowerCase().includes(s)||(g.location||'').toLowerCase().includes(s));
    
    if(!f.length){ c.innerHTML='<div class="empty"><i class="fas fa-store-slash"></i><h4>لا جيمات</h4></div>'; return; }
    
    c.innerHTML = f.map(g => `
      <div class="gym-card" onclick='showGym("${g.id}")'>
        <div class="gym-card-image">
          ${g.images?.length ? `<img src="${g.images[0]}" oncontextmenu="return false;">` : '<i class="fas fa-dumbbell ph"></i>'}
          ${g.offerPrice ? `<span class="gym-card-badge">عرض ${g.offerPrice} ج.م</span>` : ''}
        </div>
        <div class="gym-card-body">
          <div class="gym-card-title">${g.name}</div>
          <div class="gym-prices">
            <div class="gym-price-item"><span class="gym-price-value">${g.monthlyPrice}</span><span class="gym-price-label">ج.م/شهر</span></div>
            ${g.yearlyPrice?`<div class="gym-price-item"><span class="gym-price-value">${g.yearlyPrice}</span><span class="gym-price-label">ج.م/سنة</span></div>`:''}
          </div>
        </div>
      </div>`).join('');
  } catch(e) { c.innerHTML='<div class="empty"><i class="fas fa-wifi"></i><h4>تأكد من الاتصال</h4></div>'; }
}

function subGym() {
  const ph = sessionStorage.getItem('userPhone');
  if(!ph){ G.pendGym=G.selGym; closeModal('gymModal'); goTo('register'); T('سجل بياناتك','warning'); return; }
  G.subType='monthly';
  document.getElementById('modalTitle').textContent='اختر النوع';
  document.getElementById('modalBody').innerHTML=`<p style="text-align:center;"><strong>${G.selGym.name}</strong></p><div class="radio-group"><div class="radio-option selected" id="optMonthly" onclick="selectSubType('monthly')">📅 شهري<span style="display:block;font-size:11px;">${G.selGym.monthlyPrice} ج.م</span></div>${G.selGym.yearlyPrice?`<div class="radio-option" id="optYearly" onclick="selectSubType('yearly')">📆 سنوي<span style="display:block;font-size:11px;">${G.selGym.yearlyPrice} ج.م</span></div>`:''}</div>`;
  document.getElementById('modalFooter').innerHTML='<button class="btn btn-primary" onclick="confirmSub()">✅ تأكيد</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>';
  openModal('gymModal');
}
function selectSubType(t){ G.subType=t; document.querySelectorAll('.radio-option').forEach(o=>o.classList.remove('selected')); document.getElementById(t==='monthly'?'optMonthly':'optYearly').classList.add('selected'); }
async function confirmSub(){
  const ph=sessionStorage.getItem('userPhone');
  const req = { gymId: G.selGym.id, gymName: G.selGym.name, name: sessionStorage.getItem('userName')||'', phone: ph, subType: G.subType, status: 'pending', created: new Date().toISOString() };

  await rtdb.ref('newRequests/'+G.selGym.id).set({ time: Date.now() });

}

async function saveProfile() {
  const n=document.getElementById('regName').value.trim(), p=document.getElementById('regPhone').value.trim();
  if(!n||!p){T('اكتب البيانات','error');return;}
  sessionStorage.setItem('userPhone', p); sessionStorage.setItem('userName', n);
  await db.collection('profiles').doc(p).set({ name: n, phone: p, created: new Date().toISOString() }, { merge: true });
  T('تم الحفظ');
  if(G.pendGym){ const g=G.pendGym; G.pendGym=null; goTo('home'); setTimeout(()=>{G.selGym=g;subGym();},200); }
  else goTo('profile');
}

async function loadProfile() {
  const ph=sessionStorage.getItem('userPhone'), c=document.getElementById('profileContent');
  if(!ph){c.innerHTML='<div class="empty"><i class="fas fa-user-circle"></i><h4>سجل دخولك</h4><button class="btn btn-primary btn-sm" onclick="goTo(\'register\')">تسجيل</button></div>';return;}
  
  // Load from Firebase
  const profSnap = await db.collection('profiles').doc(ph).get();
  const prof = profSnap.exists ? profSnap.data() : null;
  if(!prof){ goTo('register'); return; }
  
  const memSnap = await db.collection('members').where('phone','==',ph).get();
  const members = []; memSnap.forEach(doc => members.push({ id: doc.id, ...doc.data() }));
  
  const active = members.filter(m=>m.active&&!m.leftByUser);
  const hist = members.filter(m=>!m.active||m.leftByUser);
  
  c.innerHTML=`<div style="background:var(--card);border-radius:16px;padding:16px;text-align:center;margin-bottom:12px;"><i class="fas fa-user-circle" style="font-size:46px;color:var(--primary);"></i><h2>${prof.name}</h2><p>📞 ${prof.phone}</p><button class="btn btn-outline btn-sm" onclick="logoutUser()">خروج</button></div><h3>📋 اشتراكاتي</h3>${active.length?active.map(m=>{const ok=m.paid&&!exp(m.due);return`<div style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:16px;padding:14px;color:white;margin-bottom:8px;position:relative;"><button style="position:absolute;top:8px;left:8px;background:rgba(255,255,255,0.2);border:none;color:white;padding:4px 8px;border-radius:10px;font-size:10px;cursor:pointer;" onclick="leaveGym('${m.id}')">🚪 خروج</button><div style="font-size:16px;font-weight:800;">${m.gymName}</div><div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px;margin:6px 0;"><div style="display:flex;justify-content:space-between;font-size:12px;"><span>بدء</span><span>${fmt(m.start)}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;"><span>استحقاق</span><span>${fmt(m.due)}</span></div></div><span style="display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;background:${ok?'rgba(0,184,148,0.3)':'rgba(255,107,107,0.3)'};">${ok?'✅ مدفوع':'❌ متأخر'}</span></div>`}).join(''):'<p>لا اشتراكات</p>'}${hist.length?`<h3>📜 السجل</h3>${hist.map(m=>`<div style="background:var(--card);border-radius:8px;padding:8px;margin-bottom:4px;font-size:12px;"><strong>${m.gymName}</strong> - ${fmt(m.due)}</div>`).join('')}`:''}`;
}

async function leaveGym(mid) {

async function checkCode() {
  const code = document.getElementById('redeemCode').value.trim().toUpperCase();
  if(code===AD){ openModal('passcodeModal'); return; }
  const snap = await db.collection('gyms').where('redeemCode','==',code).get();
  if(snap.empty){ T('كود غلط','error'); return; }
  const doc = snap.docs[0]; G.gym = { id: doc.id, ...doc.data() }; G.gid = doc.id;
  if(!G.gym.active||exp(G.gym.subEnd)){ T('الجيم مش مفعل','error'); return; }
  sessionStorage.setItem('coachId', G.gid);
  document.getElementById('coachTitle').textContent=G.gym.name;
  document.getElementById('redeemCode').value='';
  goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount();
  rtdb.ref('newRequests/'+G.gid).on('value', snap => { if(snap.val()){ T('🔔 طلب جديد!','warning'); loadReqCount(); rtdb.ref('newRequests/'+G.gid).remove(); } });
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${t}')"]`)?.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='requests')loadRequests(); if(t==='members')loadMembers(); if(t==='sessions')loadSessions();
}
function loadGymForm(){ const g=G.gym; document.getElementById('gymName').value=g.name||''; document.getElementById('monthlyPrice').value=g.monthlyPrice||''; document.getElementById('yearlyPrice').value=g.yearlyPrice||''; document.getElementById('sessionPrice').value=g.sessionPrice||''; document.getElementById('offerPrice').value=g.offerPrice||''; document.getElementById('gymLoc').value=g.location||''; document.getElementById('gymNotes').value=g.notes||''; }
function renderImages(){ const g=G.gym, grid=document.getElementById('imagesGrid'); let h=''; if(g.images)g.images.forEach((img,i)=>{h+=`<div class="img-box"><img src="${img}" oncontextmenu="return false;"><button class="del-img" onclick="event.stopPropagation();delImg(${i})">✕</button></div>`;}); h+=`<div class="img-box add-box" onclick="document.getElementById('imageInput').click()"><i class="fas fa-plus"></i></div>`; grid.innerHTML=h; }
async function uploadGymImages(input){ if(!G.gym.images)G.gym.images=[]; if(G.gym.images.length>=5){T('5 صور كحد أقصى','warning');input.value='';return;} for(const f of Array.from(input.files).slice(0,5-G.gym.images.length)){T('⏳ جاري الرفع...');const url=await uploadToCloudinary(f);if(url){G.gym.images.push(url);renderImages();T('✅ تم الرفع');}else T('❌ فشل الرفع','error');} input.value=''; }
function delImg(i){ showConfirm('حذف','متأكد؟',()=>{G.gym.images.splice(i,1);renderImages();}); }
function renderPhones(){ const g=G.gym, list=document.getElementById('phonesList'); let h=''; if(g.phones)g.phones.forEach((p,i)=>{h+=`<div class="phone-row"><input type="tel" value="${p}" class="form-control" onchange="updatePhone(${i},this.value)"><button class="del-phone" onclick="delPhone(${i})">✕</button></div>`;}); list.innerHTML=h; }
function addPhoneField(){ if(!G.gym.phones)G.gym.phones=[]; G.gym.phones.push(''); renderPhones(); }
function updatePhone(i,v){ G.gym.phones[i]=v; }
function delPhone(i){ G.gym.phones.splice(i,1); renderPhones(); }

async function saveGym(){
  const n=document.getElementById('gymName').value.trim(), mp=+document.getElementById('monthlyPrice').value;
  if(!n){T('اكتب الاسم','error');return;} if(!mp){T('اكتب السعر','error');return;}
  const data = {
    name: n, monthlyPrice: mp,
    yearlyPrice: document.getElementById('yearlyPrice').value?+document.getElementById('yearlyPrice').value:null,
    sessionPrice: +document.getElementById('sessionPrice').value||0,
    offerPrice: document.getElementById('offerPrice').value?+document.getElementById('offerPrice').value:null,
    location: document.getElementById('gymLoc').value,
    notes: document.getElementById('gymNotes').value,
    images: G.gym.images||[], phones: G.gym.phones||[]
  };
  await db.collection('gyms').doc(G.gid).update(data);
  G.gym = { ...G.gym, ...data }; document.getElementById('coachTitle').textContent = G.gym.name;
  T('تم الحفظ');
}

async function loadRequests(){
  const snap=await db.collection('requests').where('gymId','==',G.gid).where('status','==','pending').get();
  const reqs=[]; snap.forEach(doc=>reqs.push({id:doc.id,...doc.data()}));
  const c=document.getElementById('requestsList');
  if(!reqs.length){c.innerHTML='<div class="empty"><i class="fas fa-inbox"></i><h4>لا طلبات</h4></div>';return;}
  c.innerHTML=reqs.map(r=>`<div style="background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;"><div style="display:flex;justify-content:space-between;"><strong>${r.name}</strong><span style="font-size:10px;">${fmt(r.created)}</span></div><div style="font-size:11px;">📞 ${r.phone} | ${r.subType}</div><div style="display:flex;gap:4px;"><button class="btn btn-success btn-sm" onclick='accReq("${r.id}")'>✅ قبول</button><button class="btn btn-danger btn-sm" onclick='rejReq("${r.id}")'>❌ رفض</button></div></div>`).join('');

async function accReq(rid){
  const reqSnap=await db.collection('requests').doc(rid).get(); const req=reqSnap.data();
  const dupSnap=await db.collection('members').where('gymId','==',G.gid).where('phone','==',req.phone).where('active','==',true).where('leftByUser','==',false).get();
  if(!dupSnap.empty){T('الرقم موجود','error');return;}
  const sd=new Date(); const dd=new Date(sd); req.subType==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365);
  await db.collection('members').add({gymId:G.gid,gymName:G.gym.name,name:req.name,phone:req.phone,type:req.subType,start:sd.toISOString(),due:dd.toISOString(),monthlyPrice:G.gym.monthlyPrice,yearlyPrice:G.gym.yearlyPrice,paid:true,active:true,created:new Date().toISOString()});
  await db.collection('requests').doc(rid).update({status:'accepted'});
  loadRequests();loadReqCount();T('تم القبول');
}
async function rejReq(rid){ showConfirm('رفض','متأكد؟',async()=>{await db.collection('requests').doc(rid).update({status:'rejected'});loadRequests();loadReqCount();T('تم الرفض');}); }

async function loadMembers(){
  const snap=await db.collection('members').where('gymId','==',G.gid).where('active','==',true).where('leftByUser','==',false).get();
  const ms=[]; snap.forEach(doc=>ms.push({id:doc.id,...doc.data()}));

async function memAct(mid){
  const snap=await db.collection('members').doc(mid).get(); G.curMem={id:snap.id,...snap.data()};
  const ok=G.curMem.paid&&!exp(G.curMem.due); const canRenew=!G.curMem.paid||exp(G.curMem.due);
  document.getElementById('modalTitle').textContent='تفاصيل';
  document.getElementById('modalBody').innerHTML=`<div style="text-align:center;"><i class="fas fa-user-circle" style="font-size:40px;color:var(--primary);"></i><h3>${G.curMem.name}</h3><p>📞 ${G.curMem.phone}</p><div style="background:var(--light);border-radius:8px;padding:10px;text-align:right;"><div style="display:flex;justify-content:space-between;"><span>النوع</span><strong>${G.curMem.type==='monthly'?'شهري':'سنوي'}</strong></div><div style="display:flex;justify-content:space-between;"><span>الاستحقاق</span><strong>${fmt(G.curMem.due)}</strong></div><span class="status-badge ${ok?'status-paid':'status-unpaid'}">${ok?'مدفوع':'متأخر'}</span></div></div>`;
  let ft='';
  if(canRenew)ft=`<button class="btn btn-success" onclick="renewMem()">🔄 تجديد</button>`;
  else ft=`<div style="padding:6px;background:#E8E8E8;border-radius:6px;text-align:center;margin-bottom:4px;">لا يمكن التجديد</div>`;
  ft+=`<button class="btn btn-danger btn-sm" onclick="expelMem()">❌ طرد</button><button class="btn btn-outline" onclick="closeModal('gymModal')">إغلاق</button>`;
  document.getElementById('modalFooter').innerHTML=ft; openModal('gymModal');
}
async function renewMem(){
  const m=G.curMem;
  if(m.paid&&!exp(m.due)){T('الاشتراك لسه ساري','error');return;}
  document.getElementById('modalTitle').textContent='تجديد';
  document.getElementById('modalBody').innerHTML=`<p style="text-align:center;"><strong>${m.name}</strong></p><div class="radio-group"><div class="radio-option selected" id="renOptMonthly" onclick="selectRenType('monthly')">📅 شهري</div>${G.gym.yearlyPrice?`<div class="radio-option" id="renOptYearly" onclick="selectRenType('yearly')">📆 سنوي</div>`:''}</div>`;
  document.getElementById('modalFooter').innerHTML=`<button class="btn btn-success" onclick="confirmRenew()">✅ تأكيد</button><button class="btn btn-outline" onclick='memAct("${m.id}")'>رجوع</button>`;
  G.subType='monthly'; openModal('gymModal');
}
function selectRenType(t){ G.subType=t; document.querySelectorAll('#modalBody .radio-option').forEach(o=>o.classList.remove('selected')); document.getElementById(t==='monthly'?'renOptMonthly':'renOptYearly').classList.add('selected'); }
async function confirmRenew(){
  const dd=new Date(); G.subType==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365);
  await db.collection('members').doc(G.curMem.id).update({due:dd.toISOString(),paid:true,type:G.subType});
  closeModal('gymModal');loadMembers();T('تم التجديد');
}

}

async function loadAdmin(){ const snap=await db.collection('gyms').get(); const gs=[]; snap.forEach(doc=>gs.push({id:doc.id,...doc.data()})); G.allGyms=gs; /* rest same */ }
function logoutAdmin(){ sessionStorage.removeItem('admin'); goTo('home'); }

// ==================== INIT ====================
(async function(){
  if(localStorage.getItem('darkMode')==='1'){ document.body.classList.add('dark'); }
  if(sessionStorage.getItem('admin')==='1'){ goTo('admin'); loadAdmin(); return; }
  const cid=sessionStorage.getItem('coachId');
  if(cid){ const snap=await db.collection('gyms').doc(cid).get(); if(snap.exists){ G.gym={id:snap.id,...snap.data()}; G.gid=snap.id; document.getElementById('coachTitle').textContent=G.gym.name; goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount(); return; } sessionStorage.removeItem('coachId'); }
  goTo('home'); loadGyms();
})();
</script>
