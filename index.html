<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>GYMAWY</title>
    

  </head>
    
  <body>
  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6C5CE7">
  <title>Gymawy | جيماوي</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    :root {
      --primary: #6C5CE7; --primary-dark: #5A4BD1; --primary-light: #A29BFE;
      --secondary: #00CEC9; --success: #00B894; --danger: #FF6B6B; --warning: #FDCB6E;
      --dark: #2D3436; --gray: #636E72; --gray-light: #B2BEC3;
      --light: #F8F9FA; --white: #FFFFFF; --border: #E9ECEF;
      --shadow: 0 2px 15px rgba(0,0,0,0.08); --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
      --radius: 20px; --radius-sm: 12px;
      --bg: #F0F2F5; --card: #FFFFFF; --text: #2D3436; --text-secondary: #636E72;
    }

    body.dark {
      --bg: #1A1A2E; --card: #16213E; --text: #E0E0E0; --text-secondary: #A0A0A0;
      --border: #2A2A4A; --shadow: 0 2px 15px rgba(0,0,0,0.3);
      --light: #1F2B47; --white: #16213E; --gray: #A0A0A0; --gray-light: #6B7280;
    }

    body { background: var(--bg); min-height: 100vh; overflow-x: hidden; color: var(--text); transition: all 0.3s; }
    .page { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header { background: var(--card); padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-size: 20px; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .header-logo i { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-actions { display: flex; gap: 4px; align-items: center; }
    .btn-header { padding: 8px 12px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--light); color: var(--text); display: flex; align-items: center; gap: 5px; }
    .btn-icon-only { width: 34px; height: 34px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text); }

    .container { max-width: 520px; margin: 0 auto; padding: 12px; }

    .search-box { background: var(--card); border-radius: 50px; padding: 4px 16px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); margin-bottom: 14px; border: 2px solid var(--border); }
    .search-box input { flex: 1; padding: 11px 0; border: none; font-size: 14px; background: transparent; outline: none; color: var(--text); }

    .gym-card { background: var(--card); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; box-shadow: var(--shadow); cursor: pointer; }
    .gym-card-image { width: 100%; height: 170px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; position: relative; }
    .gym-card-image img { width: 100%; height: 100%; object-fit: cover; }
    .gym-card-image .ph { font-size: 50px; color: rgba(255,255,255,0.4); }
    .gym-card-badge { position: absolute; top: 10px; right: 10px; background: var(--success); color: white; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700; }
    .gym-card-body { padding: 14px; }
    .gym-card-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .gym-prices { display: flex; gap: 12px; flex-wrap: wrap; }
    .gym-price-item { display: flex; flex-direction: column; }
    .gym-price-value { font-size: 18px; font-weight: 800; color: var(--primary); }
    .gym-price-label { font-size: 10px; color: var(--gray-light); }

    .loading-spinner { text-align: center; padding: 30px; }
    .loading-spinner i { font-size: 30px; color: var(--primary); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn { padding: 13px 18px; border-radius: 50px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.3s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); }
    .btn-sm { width: auto; padding: 8px 12px; font-size: 12px; }

    .tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 12px; flex-wrap: wrap; }
    .tab-btn { padding: 9px 14px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .form-card h3 { font-size: 16px; margin-bottom: 12px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 12px; color: var(--text); }
    .form-control { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--card); color: var(--text); }
    .form-control:focus { outline: none; border-color: var(--primary); }
    textarea.form-control { resize: vertical; min-height: 60px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .images-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .img-box { aspect-ratio: 1; border-radius: 10px; background: var(--light); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); cursor: pointer; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .img-box .del-img { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .img-box.add-box i { font-size: 24px; color: var(--gray-light); }

    .phones-list { display: flex; flex-direction: column; gap: 6px; }
    .phone-row { display: flex; gap: 6px; align-items: center; }
    .phone-row input { flex: 1; }
    .phone-row .del-phone { width: 32px; height: 32px; border-radius: 50%; background: var(--danger); color: white; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .add-phone-btn { margin-top: 6px; padding: 8px; background: var(--light); border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; text-align: center; color: var(--primary); font-weight: 600; font-size: 13px; }

    .members-table { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .members-table-header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; font-size: 11px; font-weight: 700; text-align: center; }
    .members-table-row { padding: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 0.8fr; gap: 2px; align-items: center; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; text-align: center; color: var(--text); }
    .status-badge { display: inline-block; padding: 3px 7px; border-radius: 15px; font-size: 10px; font-weight: 700; }
    .status-paid { background: #D4EDDA; color: #155724; }
    .status-unpaid { background: #F8D7DA; color: #721C24; }

    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); width: 100%; max-width: 520px; border-radius: 24px 24px 0 0; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--card); z-index: 10; }
    .modal-header h3 { font-size: 16px; color: var(--text); }
    .modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; color: var(--text-secondary); }
    .modal-body { padding: 14px; color: var(--text); }
    .modal-footer { padding: 10px 14px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }

    .toast { position: fixed; bottom: 25px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto; background: var(--dark); color: white; padding: 12px 16px; border-radius: 50px; text-align: center; z-index: 2000; display: none; font-weight: 600; font-size: 13px; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #333; }

    .radio-group { display: flex; gap: 8px; }
    .radio-option { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px; color: var(--text); background: var(--card); }
    .radio-option.selected { border-color: var(--primary); background: rgba(108,92,231,0.08); color: var(--primary); }

    .empty { text-align: center; padding: 30px 15px; color: var(--text-secondary); }
    .empty i { font-size: 40px; opacity: 0.5; margin-bottom: 10px; }

    /* كاردات الصفحة الرئيسية */
    .home-cards { display: flex; flex-direction: column; gap: 16px; }
    .main-card { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: var(--radius); padding: 30px 24px; color: white; cursor: pointer; box-shadow: 0 15px 40px rgba(108,92,231,0.4); transition: all 0.3s; position: relative; overflow: hidden; }
    .main-card:active { transform: scale(0.98); }
    .main-card-icon { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .main-card-icon i { font-size: 28px; }
    .main-card h2 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
    .main-card p { font-size: 13px; opacity: 0.85; }
    .main-card-arrow { position: absolute; top: 50%; left: 20px; transform: translateY(-50%); font-size: 20px; opacity: 0.7; }
    
    .sub-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sub-card { background: var(--card); border-radius: var(--radius-sm); padding: 24px 16px; text-align: center; cursor: pointer; box-shadow: var(--shadow); transition: all 0.3s; border: 2px solid var(--border); }
    .sub-card.locked { opacity: 0.6; cursor: not-allowed; }
    .sub-card i { font-size: 32px; color: var(--primary-light); margin-bottom: 10px; }
    .sub-card h4 { color: var(--text); font-size: 15px; margin-bottom: 10px; }
    .locked-badge { background: var(--light); color: var(--gray-light); padding: 4px 10px; border-radius: 12px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px; }

    .verified-badge { position: absolute; top: 8px; left: 8px; background: #FFD700; color: #333; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 3px; z-index: 5; }

    .redeem-card { background: var(--card); border-radius: var(--radius); padding: 35px 25px; text-align: center; width: 100%; max-width: 400px; margin: 0 auto; box-shadow: var(--shadow-lg); }
    .redeem-card i { font-size: 50px; color: var(--primary); margin-bottom: 15px; }
    .redeem-card h2 { color: var(--text); margin-bottom: 20px; font-size: 20px; }
    .redeem-card .form-control { text-align: center; font-size: 22px !important; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 15px; font-weight: 700; }

    .passcode-grid { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
    .passcode-input { width: 45px !important; height: 55px; text-align: center; font-size: 24px !important; font-weight: 700; }

    @media (max-width: 400px) {
      .members-table-header, .members-table-row { grid-template-columns: 1.2fr 0.8fr 0.8fr 0.6fr; font-size: 10px; padding: 8px 6px; }
      .sub-cards { grid-template-columns: 1fr; }
      .main-card { padding: 24px 18px; }
      .main-card h2 { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- ==================== الصفحة الرئيسية ==================== -->
<div class="page active" id="homePage">
  <div class="header">
    <div class="header-logo"><i class="fas fa-dumbbell"></i> Gymawy</div>
    <div class="header-actions">
      <button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button>
      <button class="btn-header" onclick="goTo('myReq')"><i class="fas fa-clock"></i> طلباتي</button>
      <button class="btn-header" onclick="goTo('profile')"><i class="fas fa-user"></i> حسابي</button>
    </div>
  </div>
  <div class="container">
    <div class="home-cards">
      <div class="main-card" onclick="goTo('gymsList')">
        <div class="main-card-icon"><i class="fas fa-dumbbell"></i></div>
        <h2>الجيمات</h2>
        <p>تصفح واشترك في أفضل الجيمات القريبة منك</p>
        <div class="main-card-arrow"><i class="fas fa-arrow-left"></i></div>
      </div>
      <div class="sub-cards">
        <div class="sub-card locked" onclick="T('المكملات - ستتوفر قريباً', 'warning')">
          <i class="fas fa-capsules"></i>
          <h4>المكملات</h4>
          <span class="locked-badge"><i class="fas fa-lock"></i> قريباً</span>
        </div>
        <div class="sub-card locked" onclick="T('مدرب برايفت - ستتوفر قريباً', 'warning')">
          <i class="fas fa-user-tie"></i>
          <h4>مدرب برايفت</h4>
          <span class="locked-badge"><i class="fas fa-lock"></i> قريباً</span>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-outline btn-sm" onclick="goTo('redeem')"><i class="fas fa-key"></i> دخول الكوتش</button>
    </div>
  </div>
</div>

<!-- ==================== صفحة الجيمات (التطبيق الأصلي) ==================== -->
<div class="page" id="gymsListPage">
  <div class="header">
    <button class="btn-header" onclick="goTo('home')"><i class="fas fa-arrow-right"></i> رجوع</button>
    <h2>الجيمات</h2>
    <div></div>
  </div>
  <div class="container">
    <div class="search-box"><i class="fas fa-search" style="color:var(--gray-light);"></i><input type="text" id="searchInput" placeholder="ابحث عن جيم..." oninput="loadGyms()"></div>
    <div id="gymsList"><div class="loading-spinner"><i class="fas fa-spinner"></i><p>جاري تحميل الجيمات...</p></div></div>
  </div>
</div>

<!-- ==================== طلباتي ==================== -->
<div class="page" id="myReqPage"><div class="header"><button class="btn-header" onclick="goTo('home')"><i class="fas fa-arrow-right"></i> رجوع</button><h2>طلباتي</h2><div></div></div><div class="container" id="myReqContent"></div></div>

<!-- ==================== حسابي ==================== -->
<div class="page" id="profilePage"><div class="header"><button class="btn-header" onclick="goTo('home')"><i class="fas fa-arrow-right"></i> رجوع</button><h2>حسابي</h2><div></div></div><div class="container" id="profileContent"></div></div>

<!-- ==================== دخول الكوتش ==================== -->
<div class="page" id="redeemPage"><div class="header"><button class="btn-header" onclick="goTo('home')"><i class="fas fa-arrow-right"></i> رجوع</button><h2>دخول الكوتش</h2><div></div></div><div class="container" style="display:flex;align-items:center;justify-content:center;min-height:65vh;"><div class="redeem-card"><i class="fas fa-key"></i><h2>أدخل الكود</h2><input type="text" id="redeemCode" class="form-control" placeholder="GYM2026XX" autocomplete="off"><button class="btn btn-primary" onclick="checkCode()"><i class="fas fa-sign-in-alt"></i> دخول</button></div></div></div>

<!-- ==================== صفحة الكوتش ==================== -->
<div class="page" id="coachPage">
  <div class="header"><h2 id="coachTitle">Gymawy</h2><div class="header-actions"><button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button><button class="btn-header" onclick="logoutCoach()"><i class="fas fa-sign-out-alt"></i> خروج</button></div></div>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('gym')"><i class="fas fa-building"></i> الجيم</button>
      <button class="tab-btn" onclick="switchTab('requests')"><i class="fas fa-bell"></i> الطلبات <span id="reqBadge" style="display:none;background:var(--danger);color:white;padding:2px 8px;border-radius:10px;font-size:10px;">0</span></button>
      <button class="tab-btn" onclick="switchTab('members')"><i class="fas fa-users"></i> المشتركين</button>
      <button class="tab-btn" onclick="switchTab('sessions')"><i class="fas fa-calendar"></i> الحصص</button>
    </div>
    <div class="tab-content active" id="tab-gym"><div class="form-card"><h3><i class="fas fa-edit"></i> بيانات الجيم</h3><div class="form-group"><label>اسم الجيم</label><input type="text" id="gymName" class="form-control"></div><div class="form-group"><label>صور الجيم</label><div class="images-grid" id="imagesGrid"></div><input type="file" id="imageInput" accept="image/*" multiple style="display:none;" onchange="uploadGymImages(this)"></div><div class="row"><div class="form-group"><label>شهري</label><input type="number" id="monthlyPrice" class="form-control"></div><div class="form-group"><label>سنوي</label><input type="number" id="yearlyPrice" class="form-control"></div></div><div class="row"><div class="form-group"><label>الحصة</label><input type="number" id="sessionPrice" class="form-control"></div><div class="form-group"><label>عرض</label><input type="number" id="offerPrice" class="form-control"></div></div><div class="form-group"><label>أرقام التواصل</label><div class="phones-list" id="phonesList"></div><div class="add-phone-btn" onclick="addPhoneField()"><i class="fas fa-plus"></i> إضافة رقم</div></div><div class="form-group"><label>الموقع</label><input type="text" id="gymLoc" class="form-control"></div><div class="form-group"><label>ملاحظات</label><textarea id="gymNotes" class="form-control" rows="2"></textarea></div><button class="btn btn-primary" onclick="saveGym()"><i class="fas fa-save"></i> حفظ</button></div></div>
    <div class="tab-content" id="tab-requests"><div id="requestsList"></div></div>
    <div class="tab-content" id="tab-members"><button class="btn btn-success btn-sm" onclick="showAddMember()" style="margin-bottom:8px;"><i class="fas fa-plus"></i> إضافة مشترك</button><input type="text" id="memberSearchInput" class="form-control" placeholder="بحث عن مشترك..." oninput="loadMembers()" style="margin-bottom:8px;"><div id="membersList"></div></div>
    <div class="tab-content" id="tab-sessions"><div class="form-group"><label>تاريخ</label><input type="date" id="sessionDate" class="form-control" onchange="loadSessions()"></div><div style="display:flex;gap:8px;margin-bottom:8px;"><div class="form-card" style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);" id="sessCount">0</div><div>حصص</div></div><div class="form-card" style="flex:1;text-align:center;"><div style="font-size:22px;font-weight:800;color:var(--primary);" id="sessTotal">0 ج.م</div><div>إجمالي</div></div></div><button class="btn btn-primary btn-sm" onclick="showAddSession()" style="margin-bottom:8px;"><i class="fas fa-plus"></i> حصة</button><div id="sessionsList"></div></div>
  </div>
</div>

<!-- ==================== لوحة المطور ==================== -->
<div class="page" id="adminPage"><div class="header"><h2>لوحة المطور</h2><div class="header-actions"><button class="btn-icon-only" onclick="toggleDark()"><i class="fas fa-moon"></i></button><button class="btn-header" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> خروج</button></div></div><div class="container" id="adminContent"></div></div>

<!-- ==================== المودالات ==================== -->
<div class="modal" id="gymModal"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal('gymModal')"><i class="fas fa-times"></i></button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>
<div class="modal" id="confirmModal"><div class="modal-content"><div class="modal-header"><h3 id="confirmTitle"></h3><button class="modal-close" onclick="closeModal('confirmModal')"><i class="fas fa-times"></i></button></div><div class="modal-body" id="confirmBody"></div><div class="modal-footer"><button class="btn btn-danger" id="confirmYesBtn">نعم</button><button class="btn btn-outline" onclick="closeModal('confirmModal')">إلغاء</button></div></div></div>

// ==================== AUTH ====================
async function registerUser(fn, ph, un, pw, pwc) {
  if(!fn || fn.length < 6) { T('<i class="fas fa-times-circle"></i> الاسم يجب أن يكون 6 حروف على الأقل', 'error'); return false; }
  if(!un || un.length < 6 || un.length > 16) { T('<i class="fas fa-times-circle"></i> username يجب أن يكون 6-16 حرف', 'error'); return false; }
  if(!ph || ph.length < 10) { T('<i class="fas fa-times-circle"></i> رقم الهاتف مطلوب', 'error'); return false; }
  if(!pw || pw.length < 6) { T('<i class="fas fa-times-circle"></i> كلمة المرور 6 حروف على الأقل', 'error'); return false; }
  if(pw !== pwc) { T('<i class="fas fa-times-circle"></i> كلمتا المرور غير متطابقتين', 'error'); return false; }
  try {
    const snap = await db.collection('users').doc(un).get();
    if(snap.exists) { T('<i class="fas fa-times-circle"></i> username مستخدم بالفعل', 'error'); return false; }
    const hash = CryptoJS.SHA256(pw).toString();
    await db.collection('users').doc(un).set({ fullName: fn, phone: ph, username: un, passHash: hash, createdAt: new Date().toISOString() });
    sessionStorage.setItem('userAuth', JSON.stringify({ fullName: fn, phone: ph, username: un }));
    G.currentUser = { fullName: fn, phone: ph, username: un };
    T('<i class="fas fa-check-circle"></i> تم إنشاء الحساب بنجاح');
    return true;
  } catch(e) { T('<i class="fas fa-times-circle"></i> خطأ في الاتصال', 'error'); return false; }
}

async function loginUser(un, pw) {
  if(!un || un.length < 6) { T('<i class="fas fa-times-circle"></i> username غير صحيح', 'error'); return false; }
  if(!pw) { T('<i class="fas fa-times-circle"></i> كلمة المرور مطلوبة', 'error'); return false; }
  try {
    const snap = await db.collection('users').doc(un).get();
    if(!snap.exists) { T('<i class="fas fa-times-circle"></i> username غير موجود', 'error'); return false; }
    const data = snap.data();
    if(CryptoJS.SHA256(pw).toString() !== data.passHash) { T('<i class="fas fa-times-circle"></i> كلمة مرور غير صحيحة', 'error'); return false; }
    sessionStorage.setItem('userAuth', JSON.stringify({ fullName: data.fullName, phone: data.phone||'', username: un }));
    G.currentUser = { fullName: data.fullName, phone: data.phone||'', username: un };
    T('<i class="fas fa-check-circle"></i> أهلاً ' + data.fullName);
    return true;
  } catch(e) { T('<i class="fas fa-times-circle"></i> خطأ في الاتصال', 'error'); return false; }
}

function logoutUser() { sessionStorage.removeItem('userAuth'); G.currentUser = null; goTo('home'); T('<i class="fas fa-sign-out-alt"></i> تم تسجيل الخروج'); }

// ==================== GYMS ====================
async function loadGyms() {
  const c = document.getElementById('gymsList');
  c.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
  try {
    const snap = await db.collection('gyms').get();
    G.allGyms = []; snap.forEach(function(doc){ G.allGyms.push({ id:doc.id, ...doc.data() }); });
    const ph = G.currentUser?.phone||'';
    let hidden = [];
    if(ph) {
      const rej = await db.collection('requests').where('phone','==',ph).where('status','==','rejected').get();
      const cnt = {};
      rej.forEach(function(doc){ const d=doc.data(); cnt[d.gymId]=(cnt[d.gymId]||0)+1; });
      hidden = Object.keys(cnt).filter(function(gid){ return cnt[gid]>=5; });
    }
    const s = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let f = G.allGyms.filter(function(g){ return g.active && g.subEnd && !exp(g.subEnd) && !hidden.includes(g.id); });
    if(s) f = f.filter(function(g){ return g.name.toLowerCase().includes(s) || (g.location||'').toLowerCase().includes(s); });
    f.sort(function(a,b){ return (b.verified?1:0) - (a.verified?1:0); });
    if(!f.length) { c.innerHTML = '<div class="empty"><i class="fas fa-store-slash"></i><h4>لا جيمات متاحة</h4></div>'; return; }
    c.innerHTML = f.map(function(g){
      return `<div class="gym-card" onclick="showGym('${g.id}')">
        <div class="gym-card-image">${g.images?.length?`<img src="${g.images[0]}">`:'<i class="fas fa-dumbbell ph"></i>'}${g.verified?'<span class="verified-badge"><i class="fas fa-check-circle"></i> موثق</span>':''}${g.offerPrice?`<span class="gym-card-badge">عرض ${g.offerPrice} ج.م</span>`:''}</div>
        <div class="gym-card-body"><div class="gym-card-title">${g.name}</div><div class="gym-prices"><div class="gym-price-item"><span class="gym-price-value">${g.monthlyPrice}</span><span class="gym-price-label">ج.م/شهر</span></div>${g.yearlyPrice?`<div class="gym-price-item"><span class="gym-price-value">${g.yearlyPrice}</span><span class="gym-price-label">ج.م/سنة</span></div>`:''}</div></div>
      </div>`;
    }).join('');
  } catch(e) { c.innerHTML = '<div class="empty"><i class="fas fa-wifi"></i><h4>تأكد من الاتصال</h4></div>'; }
}

  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-primary" onclick="subGym()"><i class="fas fa-hand-paper"></i> طلب اشتراك</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إغلاق</button>';
  openModal('gymModal');
}

async function subGym() {
  if(!G.currentUser) { closeModal('gymModal'); goTo('profile'); setTimeout(function(){ T('<i class="fas fa-exclamation-triangle"></i> سجل دخولك أولاً', 'warning'); },300); return; }
  const ph = G.currentUser.phone||'';
  if(!ph) { T('<i class="fas fa-times-circle"></i> يجب تسجيل رقم الهاتف في حسابك', 'error'); return; }
  const pend = await db.collection('requests').where('gymId','==',G.selGym.id).where('phone','==',ph).where('status','==','pending').get();
  if(!pend.empty) { T('<i class="fas fa-exclamation-triangle"></i> لديك طلب معلق بالفعل', 'warning'); return; }
  G.subType = 'monthly';
  document.getElementById('modalTitle').textContent = 'اختر نوع الاشتراك';
  document.getElementById('modalBody').innerHTML = `<p style="text-align:center;"><strong>${G.selGym.name}</strong></p><div class="radio-group"><div class="radio-option selected" id="optMonthly" onclick="selSub('monthly')"><i class="fas fa-calendar"></i> شهري<span style="display:block;font-size:11px;">${G.selGym.monthlyPrice} ج.م/شهر</span></div>${G.selGym.yearlyPrice?`<div class="radio-option" id="optYearly" onclick="selSub('yearly')"><i class="fas fa-calendar-alt"></i> سنوي<span style="display:block;font-size:11px;">${G.selGym.yearlyPrice} ج.م/سنة</span></div>`:''}</div><div style="margin-top:10px;padding:8px;background:#EFF6FF;border-radius:8px;font-size:11px;color:#1E40AF;"><i class="fas fa-info-circle"></i> توجه للجيم للدفع بعد التقديم</div>`;
  document.getElementById('modalFooter').innerHTML = '<button class="btn btn-primary" onclick="confirmSub()"><i class="fas fa-check"></i> تأكيد</button><button class="btn btn-outline" onclick="closeModal(\'gymModal\')">إلغاء</button>';
  openModal('gymModal');
}
function selSub(t) { G.subType = t; document.querySelectorAll('.radio-option').forEach(function(o){ o.classList.remove('selected'); }); document.getElementById(t==='monthly'?'optMonthly':'optYearly')?.classList.add('selected'); }
async function confirmSub() {
  const ph = G.currentUser?.phone||'', nm = G.currentUser?.fullName||'';
  await db.collection('requests').add({ gymId:G.selGym.id, gymName:G.selGym.name, name:nm, phone:ph, subType:G.subType, status:'pending', created:new Date().toISOString() });
  await rtdb.ref('newRequests/'+G.selGym.id).set({ time:Date.now() });
  if(G.subType==='yearly') { await db.collection('gyms').doc(G.selGym.id).update({ verified:true }); }
  closeModal('gymModal'); T('<i class="fas fa-check-circle"></i> تم إرسال الطلب');
}

// ==================== REDEEM / COACH ====================
async function checkCode() {
  const code = document.getElementById('redeemCode').value.trim().toUpperCase();
  if(code===ADMIN_CODE) { openModal('passcodeModal'); return; }
  const snap = await db.collection('gyms').where('redeemCode','==',code).get();
  if(snap.empty) { T('<i class="fas fa-times-circle"></i> الكود غير صحيح', 'error'); return; }
  const doc = snap.docs[0]; G.gym = { id:doc.id, ...doc.data() }; G.gid = doc.id;
  if(!G.gym.active || exp(G.gym.subEnd)) { T('<i class="fas fa-times-circle"></i> الجيم غير مفعل أو الاشتراك منتهي. للتواصل: '+PHONE, 'error'); return; }
  const r = daysR(G.gym.subEnd); if(r<=3 && r>0) T('<i class="fas fa-exclamation-triangle"></i> متبقي '+r+' يوم. للتواصل: '+PHONE, 'warning');
  sessionStorage.setItem('coachId', G.gid);
  document.getElementById('coachTitle').textContent = G.gym.name;
  document.getElementById('redeemCode').value = '';
  goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount();

}

async function verifyPass() {
  let v = '';
  for(let i=1; i<=6; i++) v += document.getElementById('pc'+i).value;
  if(CryptoJS.SHA256(v).toString()===PASS_HASH) { closeModal('passcodeModal'); sessionStorage.setItem('admin','1'); for(let i=1; i<=6; i++) document.getElementById('pc'+i).value=''; goTo('admin'); loadAdmin(); }

 btn-sm" onclick="toggleVerify('${g.id}',${g.verified||false})">${g.verified?'<i class="fas fa-times"></i> إلغاء التوثيق':'<i class="fas fa-check"></i> توثيق'}</button><button class="btn btn-outline btn-sm" onclick="editGymDays('${g.id}',${r})"><i class="fas fa-calendar"></i> تعديل الأيام</button><button class="btn btn-outline btn-sm" onclick="editRedeemCode('${g.id}','${g.redeemCode}')"><i class="fas fa-key"></i> الكود</button><button class="btn btn-danger btn-sm" onclick="deleteGym('${g.id}','${g.name}')"><i class="fas fa-trash"></i> حذف</button></div></div>`; }).join('')}`;

function editGymDays(gid,cd){ document.getElementById('modalTitle').textContent='تعديل الأيام'; document.getElementById('modalBody').innerHTML=`<div class="form-group"><label>الأيام المتبقية حالياً</label><input type="text" class="form-control" value="${cd} يوم" disabled style="background:var(--light);"></div><div class="form-group"><label>عدد الأيام الجديد</label><input type="number" id="newDays" class="form-control" min="1"></div><div class="form-group"><label>أو بونص (أقل من 30)</label><input type="number" id="bonusDays" class="form-control" min="1" max="29"></div>`; document.getElementById('modalFooter').innerHTML=`<button class="btn btn-primary" onclick="saveGymDays('${gid}')"><i class="fas fa-save"></i> حفظ</button>`; openModal('gymModal'); }
async function saveGymDays(gid){ const nd=+document.getElementById('newDays').value; const bd=+document.getElementById('bonusDays').value; if(!nd&&!bd){ T('أدخل قيمة','error'); return; } if(bd&&bd>=30){ T('البونص أقل من 30','error'); return; } const snap=await db.collection('gyms').doc(gid).get(); const g=snap.data(); let newEnd; if(nd>0){ newEnd=new Date(); newEnd.setDate(newEnd.getDate()+nd); } else { newEnd=new Date(g.subEnd); newEnd.setDate(newEnd.getDate()+bd); } await db.collection('gyms').doc(gid).update({ subEnd:newEnd.toISOString() }); closeModal('gymModal'); loadAdmin(); T('<i class="fas fa-check-circle"></i> تم تحديث الأيام'); }
function newGym(){ document.getElementById('modalTitle').textContent='جيم جديد'; document.getElementById('modalBody').innerHTML='<div class="form-group"><label>الاسم</label><input type="text" id="ngName" class="form-control"></div><div class="form-group"><label>الكود</label><input type="text" id="ngCode" class="form-control" style="text-transform:uppercase;"></div><div class="row"><div class="form-group"><label>النوع</label><select id="ngType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div><div class="form-group"><label>تاريخ البداية</label><input type="date" id="ngDate" class="form-control"></div></div>'; document.getElementById('modalFooter').innerHTML='<button class="btn btn-primary" onclick="createGym()"><i class="fas fa-check"></i> إنشاء</button>'; document.getElementById('ngDate').value=new Date().toISOString().split('T')[0]; openModal('gymModal'); }
async function createGym(){ const n=document.getElementById('ngName').value.trim(), co=document.getElementById('ngCode').value.trim().toUpperCase(), t=document.getElementById('ngType').value, d=document.getElementById('ngDate').value; if(!n||!co){ T('اكتب البيانات','error'); return; } const snap=await db.collection('gyms').where('redeemCode','==',co).get(); if(!snap.empty){ T('الكود مستخدم','error'); return; } const dd=new Date(d); t==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365); await db.collection('gyms').add({ name:n, redeemCode:co, active:true, images:[], monthlyPrice:0, yearlyPrice:null, sessionPrice:0, offerPrice:null, phones:[], location:'', notes:'', subType:t, subStart:new Date(d).toISOString(), subEnd:dd.toISOString(), verified:false, created:new Date().toISOString() }); closeModal('gymModal'); loadAdmin(); T('<i class="fas fa-check-circle"></i> تم الإنشاء'); }
function editRedeemCode(gid,cc){ document.getElementById('modalTitle').textContent='تعديل الكود'; document.getElementById('modalBody').innerHTML='<div class="form-group"><label>الكود الحالي</label><input type="text" class="form-control" value="'+cc+'" disabled style="background:var(--light);"></div><div class="form-group"><label>الكود الجديد</label><input type="text" id="editRedeemCode" class="form-control" style="text-transform:uppercase;"></div>'; document.getElementById('modalFooter').innerHTML='<button class="btn btn-primary" onclick="saveRedeemCode(\''+gid+'\')"><i class="fas fa-save"></i> حفظ</button>'; openModal('gymModal'); }
async function saveRedeemCode(gid){ const nc=document.getElementById('editRedeemCode').value.trim().toUpperCase(); if(!nc){ T('اكتب الكود','error'); return; } const snap=await db.collection('gyms').where('redeemCode','==',nc).get(); if(!snap.empty&&snap.docs[0].id!==gid){ T('الكود مستخدم','error'); return; } await db.collection('gyms').doc(gid).update({ redeemCode:nc }); closeModal('gymModal'); loadAdmin(); T('<i class="fas fa-check-circle"></i> تم التحديث'); }
function deleteGym(gid,gname){ showConfirm('حذف الجيم','<div style="text-align:center;"><i class="fas fa-exclamation-triangle" style="font-size:40px;color:var(--danger);"></i><h3>حذف: '+gname+'</h3><p style="color:var(--danger);">لا يمكن التراجع!</p></div>',async function(){ const memSnap=await db.collection('members').where('gymId','==',gid).get(); const mb=db.batch(); memSnap.forEach(function(doc){ mb.delete(doc.ref); }); await mb.commit(); const reqSnap=await db.collection('requests').where('gymId','==',gid).get(); const rb=db.batch(); reqSnap.forEach(function(doc){ rb.delete(doc.ref); }); await rb.commit(); await db.collection('gyms').doc(gid).delete(); loadAdmin(); T('<i class="fas fa-check-circle"></i> تم الحذف'); }); }
function renGym(id){ G.renGym=id; document.getElementById('modalTitle').textContent='تجديد'; document.getElementById('modalBody').innerHTML='<div class="form-group"><label>النوع</label><select id="renType" class="form-control"><option value="monthly">شهري</option><option value="yearly">سنوي</option></select></div><div class="form-group"><label>تاريخ البداية</label><input type="date" id="renDate" class="form-control"></div>'; document.getElementById('modalFooter').innerHTML='<button class="btn btn-success" onclick="doRenew()">تأكيد</button>'; document.getElementById('renDate').value=new Date().toISOString().split('T')[0]; openModal('gymModal'); }
async function doRenew(){ const t=document.getElementById('renType').value, d=document.getElementById('renDate').value; const dd=new Date(d); t==='monthly'?dd.setDate(dd.getDate()+30):dd.setDate(dd.getDate()+365); await db.collection('gyms').doc(G.renGym).update({ subType:t, subStart:new Date(d).toISOString(), subEnd:dd.toISOString(), active:true }); closeModal('gymModal'); loadAdmin(); T('<i class="fas fa-check-circle"></i> تم التجديد'); }
async function togGym(id){ const snap=await db.collection('gyms').doc(id).get(); const g=snap.data(); await db.collection('gyms').doc(id).update({ active:!g.active }); loadAdmin(); T(g.active?'<i class="fas fa-pause"></i> تم التعطيل':'<i class="fas fa-play"></i> تم التفعيل'); }
function logoutAdmin(){ sessionStorage.removeItem('admin'); goTo('home'); }

// ==================== INIT ====================
(function(){
  if(localStorage.getItem('darkMode')==='1'){ document.body.classList.add('dark'); document.querySelectorAll('.btn-icon-only i').forEach(function(i){ i.className='fas fa-sun'; }); }
  const admin=sessionStorage.getItem('admin');
  if(admin==='1'){ G.currentUser={ fullName:'Admin', username:'ADMIN', phone:'' }; goTo('admin'); loadAdmin(); return; }
  const coachId=sessionStorage.getItem('coachId');
  if(coachId){ db.collection('gyms').doc(coachId).get().then(function(snap){ if(snap.exists&&snap.data().active){ G.gym={ id:snap.id, ...snap.data() }; G.gid=snap.id; G.currentUser={ fullName:'Coach', username:'COACH', phone:'' }; document.getElementById('coachTitle').textContent=G.gym.name; goTo('coach'); loadGymForm(); renderPhones(); renderImages(); loadReqCount(); } else { sessionStorage.removeItem('coachId'); goTo('home'); } }); return; }
  const userAuth=sessionStorage.getItem('userAuth');
  if(userAuth){ try { G.currentUser=JSON.parse(userAuth); } catch(e){ G.currentUser=null; } }
  goTo('home');
})();
</script>
